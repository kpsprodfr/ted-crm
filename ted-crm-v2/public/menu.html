<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>La Carte — Le TED Chassieu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
    body { background: #fff; color: #111; }

    /* ── Animations keyframes ─────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes underlineIn {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }
    @keyframes platJourIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes borderPulse {
      0%   { opacity: 0.4; }
      50%  { opacity: 1; }
      100% { opacity: 0.7; }
    }
    @keyframes sectionFadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Respect prefers-reduced-motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    #header {
      position: sticky; top: 0; z-index: 100;
      background: #111; padding: 20px 20px 0;
      transition: padding 220ms ease;
    }
    #header.compact { padding-top: 6px; padding-bottom: 0; }

    #header-title {
      color: #E8C547; font-size: 22px; font-weight: 900; letter-spacing: 1px;
      animation: fadeUp 400ms ease-out both;
      transition: font-size 220ms ease;
    }
    #header.compact #header-logo { height: 13px; width: 13px; }
    #header.compact #header-title { font-size: 13px; letter-spacing: 0.5px; }

    #header-sub {
      color: #888; font-size: 11px; letter-spacing: 0.5px; margin-top: 2px; margin-bottom: 0;
      animation: fadeUp 400ms ease-out 80ms both;
      transition: opacity 220ms ease, max-height 220ms ease;
      overflow: hidden; max-height: 20px;
    }
    #header.compact #header-sub { opacity: 0; max-height: 0; margin: 0; }

    /* Trait jaune sous le titre */
    #header-underline {
      height: 2px; background: #E8C547; width: 36px; border-radius: 2px;
      margin: 6px 0 10px;
      transform-origin: left;
      animation: underlineIn 600ms ease-out 200ms both;
      transition: width 220ms ease, margin 220ms ease;
    }
    #header.compact #header-underline { width: 12px; margin: 1px 0 3px; }

    /* Onglets carte */
    #carte-tabs { display: flex; gap: 0; border-bottom: 2px solid #222; }
    .carte-tab {
      padding: 9px 20px; font-size: 13px; font-weight: 700; cursor: pointer;
      color: #666; border: none; background: none; border-bottom: 3px solid transparent;
      margin-bottom: -2px; transition: color 150ms ease, border-color 150ms ease, padding 220ms ease;
    }
    .carte-tab.active { color: #E8C547; border-bottom-color: #E8C547; }
    #header.compact .carte-tab { padding-top: 5px; padding-bottom: 5px; }

    /* ── Sélecteur de langue ──────────────────────────────────────────────── */
    #lang-selector { position: relative; flex-shrink: 0; }
    #lang-btn {
      background: rgba(255,255,255,0.07); border: 1px solid #333;
      color: #aaa; font-size: 13px; font-weight: 700; letter-spacing: 1px;
      padding: 10px 16px; border-radius: 6px; cursor: pointer;
      min-height: 44px; min-width: 44px;
      transition: background 150ms ease; font-family: inherit;
    }
    #lang-btn:hover { background: rgba(255,255,255,0.13); color: #fff; }
    #lang-menu {
      position: absolute; top: calc(100% + 6px); right: 0;
      background: #1c1c1c; border: 1px solid #333; border-radius: 8px;
      overflow: hidden; min-width: 56px; display: none; z-index: 400;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    #lang-menu.open { display: block; }
    .lang-opt {
      display: block; width: 100%; padding: 8px 14px;
      color: #bbb; font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
      background: none; border: none; cursor: pointer; text-align: left;
      transition: background 100ms ease; font-family: inherit;
    }
    .lang-opt:hover { background: #2a2a2a; color: #fff; }
    .lang-opt.active { color: #E8C547; }

    /* ── Pills catégories ─────────────────────────────────────────────────── */
    #cats-bar {
      background: #fff; border-top: 1px solid #222;
      padding: 8px 16px; display: flex; gap: 10px;
      overflow-x: auto; scrollbar-width: none;
      margin: 0 -20px; /* déborde sur les bords du header */
    }
    #cats-bar::-webkit-scrollbar { display: none; }
    .cat-pill {
      flex-shrink: 0; padding: 10px 18px; border-radius: 20px; font-size: 13px;
      font-weight: 600; cursor: pointer; border: 1.5px solid #eee;
      background: #fff; color: #555; white-space: nowrap; min-height: 40px;
      display: inline-flex; align-items: center;
      transition: background 150ms ease, color 150ms ease, border-color 150ms ease;
    }
    .cat-pill:hover { background: #f5f5f5; }
    .cat-pill.active { background: #111; color: #E8C547; border-color: #111; }

    /* ── Contenu ──────────────────────────────────────────────────────────── */
    #content { padding: 0 16px 60px; max-width: 680px; margin: 0 auto; }

    /* ── Menu du jour — card élégante ────────────────────────────────────── */
    .menu-jour-card {
      background: #FFFDF7;
      border: 1px solid rgba(232,197,71,0.35);
      border-radius: 16px;
      padding: 28px 22px 24px;
      margin: 16px 0 8px;
      animation: platJourIn 350ms ease-out 300ms both;
    }
    .menu-jour-title {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 22px;
    }
    .menu-jour-title-line {
      flex: 1; height: 1px; background: rgba(232,197,71,0.45);
    }
    .menu-jour-title-text {
      font-size: 10px; font-weight: 800; letter-spacing: 2.5px;
      color: #E8C547; text-transform: uppercase; white-space: nowrap;
    }
    .menu-jour-row {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 0;
    }
    .menu-jour-row + .menu-jour-row {
      border-top: 1px solid rgba(232,197,71,0.2);
    }
    .menu-jour-icon {
      width: 58px; height: 58px; flex-shrink: 0;
      border: 1.5px solid rgba(232,197,71,0.5);
      border-radius: 50%; background: #fff;
      display: flex; align-items: center; justify-content: center;
    }
    .menu-jour-body { flex: 1; min-width: 0; }
    .menu-jour-label {
      font-size: 10px; font-weight: 700; color: #E8C547;
      text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px;
    }
    .menu-jour-nom {
      font-size: 17px; font-weight: 800; color: #1a1a1a;
      line-height: 1.3; margin-bottom: 5px;
    }
    .menu-jour-desc { font-size: 12px; color: #777; line-height: 1.4; margin-bottom: 4px; }
    .menu-jour-prix { font-size: 15px; font-weight: 800; color: #E8C547; }
    .menu-jour-formule {
      margin-top: 14px; padding-top: 12px;
      border-top: 1px solid rgba(232,197,71,0.2);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .menu-jour-formule-label {
      font-size: 10px; font-weight: 700; color: #E8C547;
      text-transform: uppercase; letter-spacing: 1.5px;
    }
    .menu-jour-formule-prix {
      font-size: 18px; font-weight: 900; color: #E8C547;
    }

    /* ── Suggestion du chef ───────────────────────────────────────────────── */
    .suggestion-card {
      background: #FFFDF7; border-radius: 12px; padding: 16px 18px;
      border: 1px solid rgba(232,197,71,0.35);
      border-left: 3px solid #E8C547;
      animation: platJourIn 350ms ease-out 400ms both;
    }
    .suggestion-label {
      font-size: 10px; font-weight: 800; color: #E8C547;
      text-transform: uppercase; letter-spacing: 2px; margin-bottom: 7px;
    }
    .suggestion-name-row {
      display: flex; align-items: baseline; justify-content: space-between; gap: 8px;
    }
    .suggestion-nom   { font-size: 17px; font-weight: 700; color: #1a1a1a; line-height: 1.25; flex: 1; min-width: 0; }
    .suggestion-desc  { font-size: 13px; color: #666; margin-top: 4px; line-height: 1.4; }
    .suggestion-prix  { font-size: 15px; font-weight: 800; color: #E8C547; white-space: nowrap; flex-shrink: 0; }

    /* ── Sections catégories ──────────────────────────────────────────────── */
    .section { padding-top: 32px; }
    .section-title {
      font-size: 32px; font-weight: 800; color: #111; letter-spacing: -0.5px;
      padding-bottom: 12px; border-bottom: 1px solid #f0f0f0;
      margin-bottom: 14px; line-height: 1.1;
    }
    /* Apparition au scroll — état initial */
    .section.reveal-pending {
      opacity: 0; transform: translateY(6px);
    }
    /* Après observer */
    .section.revealed {
      animation: sectionFadeUp 250ms ease-out both;
    }

    /* ── Produit ──────────────────────────────────────────────────────────── */
    .produit {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 13px 0; border-bottom: 1px solid #f7f7f7;
    }
    .produit:last-child { border-bottom: none; }
    .produit-info { flex: 1; min-width: 0; }
    .produit-nom {
      font-size: 16px; font-weight: 700; color: #222;
      margin-bottom: 3px; line-height: 1.3;
    }
    .produit-desc {
      font-size: 13px; color: #888; line-height: 1.5; margin-bottom: 4px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .produit-accord {
      font-size: 11px; color: #bbb; font-style: italic; font-weight: 300;
      margin-top: 4px; letter-spacing: 0.1px;
    }
    .produit-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
    .badge-item { font-size: 11px; font-weight: 600; background: #fff8e1; color: #b8860b; border-radius: 20px; padding: 2px 9px; }
    .produit-prix { font-size: 14px; font-weight: 700; color: #111; white-space: nowrap; padding-top: 1px; flex-shrink: 0; }

    /* ── Bandeau Brasero ─────────────────────────────────────────────────── */
    #brasero-banner {
      display: none;
      margin: 12px 16px 0; max-width: 648px; margin-left: auto; margin-right: auto;
      background: #fffbe6; border: 1.5px solid #E8C547; border-radius: 10px;
      padding: 10px 16px; text-align: center;
      font-size: 13px; font-weight: 600; color: #5a4500;
      line-height: 1.4;
    }
    #brasero-banner.visible { display: block; }

    /* ── Note légale ──────────────────────────────────────────────────────── */
    .note-legale { font-size: 11px; color: #bbb; margin-top: 16px; margin-bottom: 24px; font-style: italic; line-height: 1.6; }

    /* ── Footer ───────────────────────────────────────────────────────────── */
    footer { background: #111; color: #888; text-align: center; padding: 28px 20px; font-size: 12px; line-height: 2; }
    footer strong { color: #fff; }

    /* ── États chargement ─────────────────────────────────────────────────── */
    #loading { text-align: center; padding: 60px 20px; color: #888; font-size: 14px; }
    #error   { text-align: center; padding: 60px 20px; color: #dc2626; font-size: 14px; }

    /* ── Bouton retour en haut ────────────────────────────────────────────── */
    #back-top {
      position: fixed; bottom: 24px; right: 20px; z-index: 200;
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(17,17,17,0.6); color: #fff;
      border: none; cursor: pointer; font-size: 17px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: translateY(8px); pointer-events: none;
      transition: opacity 220ms ease, transform 220ms ease;
    }
    #back-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    #back-top:hover { background: rgba(17,17,17,0.85); }
  </style>
</head>
<body>

<div id="header">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
    <div style="display:flex;align-items:center;gap:10px;">
      <img src="/logo192.png" alt="Logo TED" id="header-logo" style="height:36px;width:36px;object-fit:contain;transition:height 220ms ease,width 220ms ease;">
      <div>
        <div id="header-title">LE TED</div>
        <div id="header-sub">RESTAURANT &amp; CLUB</div>
      </div>
    </div>
    <div id="lang-selector">
      <button id="lang-btn" onclick="toggleLangMenu()">FR</button>
      <div id="lang-menu">
        <button class="lang-opt" onclick="setLang('fr')">FR</button>
        <button class="lang-opt" onclick="setLang('en')">EN</button>
        <button class="lang-opt" onclick="setLang('es')">ES</button>
        <button class="lang-opt" onclick="setLang('it')">IT</button>
      </div>
    </div>
  </div>
  <div id="header-underline"></div>
  <div id="carte-tabs">
    <!-- Généré dynamiquement depuis menu_cartes -->
  </div>
  <div id="cats-bar"></div>
</div>

<div id="brasero-banner">🔥 Carte Brasero disponible le mercredi soir uniquement</div>
<div id="plat-jour-container" style="display:none;padding:12px 16px 0;max-width:680px;margin:0 auto;"></div>
<div id="suggestion-container" style="display:none;padding:8px 16px 0;max-width:680px;margin:0 auto;"></div>

<div id="loading">Chargement de la carte...</div>
<div id="error" style="display:none"></div>
<div id="content" style="display:none"></div>

<button id="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Retour en haut">↑</button>

<footer>
  <img src="/logo192.png" alt="Logo TED" style="height:48px;width:48px;object-fit:contain;opacity:0.85;margin-bottom:12px;display:block;margin-left:auto;margin-right:auto;">
  <strong>LE TED</strong><br>
  28 Av. des Frères Montgolfier, 69680 Chassieu<br>
  04 72 02 20 20
</footer>

<script>
  // ── Configuration Supabase ──────────────────────────────────────────────────
  // Ces valeurs sont publiques (clé anon avec RLS) — safe à exposer
  const SUPA_URL = 'https://mwpfaytccypvdrgapptk.supabase.co';
  const SUPA_KEY = 'sb_publishable_4-uVtQtXd0jLGkNAFsx4yw_ni17DzN_';

  // ── État ────────────────────────────────────────────────────────────────────
  let carteActive = 'restaurant';
  let allCartes = [{ slug:'restaurant', nom:'Restaurant' }, { slug:'brasero', nom:'Brasero' }];
  let allCategories = [];
  let allProduits = [];
  let platJour = null;
  let dessertJour = null;
  let suggestionJour = null;

  // ── Cartes dynamiques depuis menu_cartes ────────────────────────────────────
  async function loadCartes() {
    try {
      const r = await fetch(
        `${SUPA_URL}/rest/v1/menu_cartes?select=nom,slug,ordre&visible=eq.true&order=ordre`,
        { headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` } }
      );
      if (r.ok) {
        const data = await r.json();
        if (data && data.length > 0) allCartes = data;
      }
    } catch(e) {} // silencieux — fallback hardcodé
    renderCarteTabs();
  }

  function renderCarteTabs() {
    const container = document.getElementById('carte-tabs');
    container.innerHTML = '';
    allCartes.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'carte-tab' + (c.slug === carteActive ? ' active' : '');
      btn.id = 'tab-' + c.slug;
      btn.dataset.carte = c.slug;
      btn.textContent = c.nom;
      btn.onclick = () => switchCarte(c.slug);
      container.appendChild(btn);
    });
  }

  function formatPrix(p) {
    if (!p) return '';
    const s = String(p).trim();
    if (!s || s.includes('€')) return s;
    return /^[\d]+([,.][\d]{1,2})?$/.test(s) ? s + ' €' : s;
  }

  // ── Langue ──────────────────────────────────────────────────────────────────
  const UI = {
    fr: { restaurant:'Restaurant', brasero:'Brasero', plat_jour:'Plat du jour', dessert_jour:'Dessert du jour', suggestion_chef:'Suggestion du chef', brasero_banner:'🔥 Carte Brasero disponible le mercredi soir uniquement' },
    en: { restaurant:'Restaurant', brasero:'Brasero', plat_jour:'Daily special', dessert_jour:'Dessert of the day', suggestion_chef:"Chef's special", brasero_banner:'🔥 Brasero menu available Wednesday evenings only' },
    es: { restaurant:'Restaurante', brasero:'Brasero', plat_jour:'Plato del día', dessert_jour:'Postre del día', suggestion_chef:'Sugerencia del chef', brasero_banner:'🔥 Carta Brasero disponible solo los miércoles por la noche' },
    it: { restaurant:'Ristorante', brasero:'Brasero', plat_jour:'Piatto del giorno', dessert_jour:'Dolce del giorno', suggestion_chef:'Suggerimento dello chef', brasero_banner:'🔥 Menu Brasero disponibile solo il mercoledì sera' }
  };
  let lang = localStorage.getItem('ted_langue') || 'fr';

  function tUI(k) { return (UI[lang] || UI.fr)[k] || UI.fr[k] || k; }
  function tItem(item, field) {
    if (lang === 'fr') return item[field] || '';
    return item[field + '_' + lang] || item[field] || '';
  }

  function applyLangUI() {
    document.getElementById('lang-btn').textContent = lang.toUpperCase();
    document.querySelectorAll('.lang-opt').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === lang));
    document.getElementById('brasero-banner').textContent = tUI('brasero_banner');
    if (allCategories.length) renderMenu();
  }

  function toggleLangMenu() {
    const m = document.getElementById('lang-menu');
    m.classList.toggle('open');
  }

  function setLang(l) {
    lang = l;
    localStorage.setItem('ted_langue', l);
    document.getElementById('lang-menu').classList.remove('open');
    applyLangUI();
  }

  // Ferme le menu si clic ailleurs
  document.addEventListener('click', e => {
    const sel = document.getElementById('lang-selector');
    if (sel && !sel.contains(e.target)) document.getElementById('lang-menu').classList.remove('open');
  });

  // ── Cache sessionStorage (TTL 5 min, revalidation silencieuse > 60s) ─────────
  const CACHE_KEY = 'ted_menu_v2';
  const CACHE_TTL  = 5 * 60 * 1000;
  const CACHE_STALE =     60 * 1000;

  function cacheGet() {
    try {
      const raw = sessionStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      const { ts, cats, prods, plats } = JSON.parse(raw);
      if (Date.now() - ts > CACHE_TTL) { sessionStorage.removeItem(CACHE_KEY); return null; }
      return { cats, prods, plats, age: Date.now() - ts };
    } catch(e) { return null; }
  }

  function cacheSet(cats, prods, plats) {
    try { sessionStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), cats, prods, plats })); } catch(e) {}
  }

  // ── Fetch Supabase ──────────────────────────────────────────────────────────
  async function fetchJSON(table, params = '') {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${params}`, {
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` }
    });
    if (!r.ok) throw new Error(`Erreur ${r.status} sur ${table}`);
    return r.json();
  }

  const CAT_COLS   = 'id,nom,nom_en,nom_es,nom_it,carte,ordre,visible';
  const PROD_COLS  = 'id,nom,nom_en,nom_es,nom_it,description,description_en,description_es,description_it,prix,accord_vin,badges,ordre,disponible,carte,categorie_id';
  const CAT_COLS_FR  = 'id,nom,carte,ordre,visible';
  const PROD_COLS_FR = 'id,nom,description,prix,accord_vin,badges,ordre,disponible,carte,categorie_id';
  const PLAT_COLS  = 'id,nom,description,prix,type,carte,actif';

  async function fetchFromNetwork(silent = false) {
    let cats, prods, plats;
    try {
      [cats, prods, plats] = await Promise.all([
        fetchJSON('menu_categories', `select=${CAT_COLS}&order=ordre`),
        fetchJSON('menu_produits',   `select=${PROD_COLS}&disponible=eq.true&order=ordre`),
        fetchJSON('menu_plat_jour',  `select=${PLAT_COLS}`)
      ]);
    } catch(e) {
      // Colonnes de traduction absentes → fallback FR uniquement
      [cats, prods, plats] = await Promise.all([
        fetchJSON('menu_categories', `select=${CAT_COLS_FR}&order=ordre`),
        fetchJSON('menu_produits',   `select=${PROD_COLS_FR}&disponible=eq.true&order=ordre`),
        fetchJSON('menu_plat_jour',  `select=${PLAT_COLS}`)
      ]);
    }
    allCategories = cats;
    allProduits = prods;
    updatePlatJour(plats);
    cacheSet(cats, prods, plats);
    if (!silent) {
      document.getElementById('loading').style.display = 'none';
    }
    renderMenu();
  }

  async function loadData() {
    const hit = cacheGet();
    if (hit) {
      // Affichage immédiat depuis le cache
      allCategories = hit.cats;
      allProduits = hit.prods;
      updatePlatJour(hit.plats);
      document.getElementById('loading').style.display = 'none';
      renderMenu();
      // Revalidation silencieuse si le cache a > 60s
      if (hit.age > CACHE_STALE) {
        fetchFromNetwork(true).catch(() => {});
      }
      return;
    }

    // Pas de cache — fetch bloquant avec indicateur de chargement
    try {
      await fetchFromNetwork(false);
    } catch(e) {
      document.getElementById('loading').style.display = 'none';
      const err = document.getElementById('error');
      err.textContent = 'Impossible de charger la carte. Vérifiez votre connexion.';
      err.style.display = 'block';
    }
  }

  // ── bfcache : retour navigateur — pas de refetch si données déjà en mémoire ─
  window.addEventListener('pageshow', e => {
    if (e.persisted && allCategories.length === 0) {
      // Edge case : JS state perdu malgré bfcache — recharge depuis sessionStorage
      const hit = cacheGet();
      if (hit) {
        allCategories = hit.cats; allProduits = hit.prods;
        updatePlatJour(hit.plats);
        document.getElementById('loading').style.display = 'none';
        renderMenu();
      } else {
        loadData();
      }
    }
  });

  function updatePlatJour(plats) {
    platJour       = plats.find(p => p.type === 'plat'       && p.carte === carteActive && p.actif) || null;
    dessertJour    = plats.find(p => p.type === 'dessert'    && p.carte === carteActive && p.actif) || null;
    suggestionJour = plats.find(p => p.type === 'suggestion' && p.carte === carteActive && p.actif) || null;
  }

  // ── Header compact + bouton retour ─────────────────────────────────────────
  const header = document.getElementById('header');
  const backTop = document.getElementById('back-top');
  window.addEventListener('scroll', () => {
    header.classList.toggle('compact', window.scrollY > 40);
    backTop.classList.toggle('visible', window.scrollY > 220);
  }, { passive: true });

  // ── Switch carte ─────────────────────────────────────────────────────────────
  function switchCarte(carte) {
    carteActive = carte;
    document.querySelectorAll('.carte-tab').forEach(t => t.classList.toggle('active', t.dataset.carte === carte));
    document.getElementById('brasero-banner').classList.toggle('visible', carte === 'brasero');
    renderMenu();
  }

  // ── Render ───────────────────────────────────────────────────────────────────
  function renderMenu() {
    const content = document.getElementById('content');
    const catsBar = document.getElementById('cats-bar');
    const platContainer = document.getElementById('plat-jour-container');
    const suggContainer = document.getElementById('suggestion-container');
    content.style.display = 'block';

    // Exclure les catégories nommées "Plat du jour" ou "Dessert du jour" — gérées séparément
    const isPlatJourCat = (nom) => /plat du jour|dessert du jour/i.test(nom);
    const cats = allCategories.filter(c =>
      c.visible !== false &&
      (c.carte === carteActive || c.carte === 'les-deux') &&
      !isPlatJourCat(c.nom)
    );

    const FOOD_CATS = ['Formules midi','Tapas','Nos planches','Salades','Plats froids','Plats signatures','Suggestions','Fromages','Desserts'];
    const isFoodSection = (nom) => FOOD_CATS.some(f => nom.toLowerCase().includes(f.toLowerCase()) || f.toLowerCase().includes(nom.toLowerCase()));

    // ── Bloc 1 : Menu du jour (plat + dessert uniquement) ──
    // Couteau + fourchette croisés (plat principal)
    const ICON_PLAT = `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#E8C547" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v4c0 1.1.9 2 2 2s2-.9 2-2V2"/><line x1="5" y1="8" x2="5" y2="22"/><line x1="19" y1="2" x2="19" y2="22"/><path d="M19 2c0 0 2 2 2 5s-2 3-2 3"/></svg>`;
    // Cupcake / gâteau (dessert)
    const ICON_DESSERT = `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#E8C547" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 14H5l-1 6h16l-1-6h-3"/><path d="M12 2c0 0-2 1.5-2 3.5S12 8 12 8s2-1 2-2.5S12 2 12 2z"/><path d="M7 8c0 0 0 6 5 6s5-6 5-6H7z"/></svg>`;

    const pjItems = [
      { item: platJour,    key: 'plat_jour',    icon: ICON_PLAT },
      { item: dessertJour, key: 'dessert_jour', icon: ICON_DESSERT },
    ].filter(x => x.item);

    if (pjItems.length > 0) {
      const hasFormule = platJour && dessertJour && platJour.prix && dessertJour.prix;
      const formuleVal = hasFormule
        ? (parseFloat(String(platJour.prix).replace(',','.')) + parseFloat(String(dessertJour.prix).replace(',','.'))).toFixed(2).replace('.',',') + ' €'
        : null;

      const rowsHtml = pjItems.map(({ item, key, icon }) => `
        <div class="menu-jour-row">
          <div class="menu-jour-icon">${icon}</div>
          <div class="menu-jour-body">
            <div class="menu-jour-label">${tUI(key)}</div>
            ${item.nom ? `<div class="menu-jour-nom">${esc(item.nom)}</div>` : ''}
            ${item.description ? `<div class="menu-jour-desc">${esc(item.description)}</div>` : ''}
            ${(item.prix_detail || item.prix) ? `<div class="menu-jour-prix">${esc(item.prix_detail || formatPrix(item.prix))}</div>` : ''}
          </div>
        </div>`).join('');

      const formuleHtml = formuleVal ? `
        <div class="menu-jour-formule">
          <span class="menu-jour-formule-label">Formule complète</span>
          <span class="menu-jour-formule-prix">${formuleVal}</span>
        </div>` : '';

      platContainer.innerHTML = `
        <div class="menu-jour-card">
          <div class="menu-jour-title">
            <div class="menu-jour-title-line"></div>
            <span class="menu-jour-title-text">— Menu du jour —</span>
            <div class="menu-jour-title-line"></div>
          </div>
          ${rowsHtml}
          ${formuleHtml}
        </div>`;
      platContainer.style.display = 'block';
    } else {
      platContainer.innerHTML = '';
      platContainer.style.display = 'none';
    }

    // ── Bloc 2 : Suggestion du chef (fond sombre, séparé) ──
    if (suggestionJour) {
      const s = suggestionJour;
      const sPrixHtml = (s.prix_detail || s.prix) ? `<div class="suggestion-prix">${esc(s.prix_detail || formatPrix(s.prix))}</div>` : '';
      suggContainer.innerHTML = `
        <div class="suggestion-card">
          <div class="suggestion-label">${tUI('suggestion_chef')}</div>
          <div class="suggestion-name-row">
            ${s.nom ? `<div class="suggestion-nom">${esc(s.nom)}</div>` : '<div></div>'}
            ${sPrixHtml}
          </div>
          ${s.description ? `<div class="suggestion-desc">${esc(s.description)}</div>` : ''}
        </div>`;
      suggContainer.style.display = 'block';
    } else {
      suggContainer.innerHTML = '';
      suggContainer.style.display = 'none';
    }

    // ── Pills (sans "Plat du jour") ──
    let pillsHtml = '';
    cats.forEach(cat => {
      const ps = allProduits.filter(p => p.categorie_id === cat.id && (p.carte === carteActive || p.carte === 'les-deux'));
      if (ps.length === 0) return;
      pillsHtml += `<button class="cat-pill" onclick="scrollToId('cat-${cat.id}')" id="pill-${cat.id}">${esc(tItem(cat, 'nom'))}</button>`;
    });
    catsBar.innerHTML = pillsHtml;

    // ── Catégories ──
    let html = '';
    let hasFood = false;
    cats.forEach(cat => {
      const ps = allProduits.filter(p => p.categorie_id === cat.id && (p.carte === carteActive || p.carte === 'les-deux'));
      if (ps.length === 0) return;

      html += `<div class="section reveal-pending" id="cat-${cat.id}">`;
      html += `<div class="section-title">${esc(tItem(cat, 'nom'))}</div>`;

      ps.forEach(p => {
        const pNom  = tItem(p, 'nom');
        const pDesc = tItem(p, 'description');
        const badges = (p.badges || []).map(b => `<span class="badge-item">${esc(b)}</span>`).join('');
        html += `<div class="produit">
          <div class="produit-info">
            <div class="produit-nom">${esc(pNom)}</div>
            ${pDesc ? `<div class="produit-desc">${esc(pDesc)}</div>` : ''}
            ${p.accord_vin ? `<div class="produit-accord">— ${esc(p.accord_vin)}</div>` : ''}
            ${badges ? `<div class="produit-badges">${badges}</div>` : ''}
          </div>
          ${(p.prix_detail || p.prix) ? `<div class="produit-prix">${esc(p.prix_detail || formatPrix(p.prix))}</div>` : ''}
        </div>`;
      });

      if (isFoodSection(cat.nom) && !hasFood) {
        hasFood = true;
      } else if (hasFood && !isFoodSection(cat.nom)) {
        html += `<p class="note-legale">Prix nets et service compris. Plats faits-maison élaborés sur place à partir de produits bruts.</p>`;
        hasFood = false;
      }

      html += `</div>`;
    });

    if (hasFood) {
      html += `<p class="note-legale">Prix nets et service compris. Plats faits-maison élaborés sur place à partir de produits bruts.</p>`;
    }

    content.innerHTML = html;
    initObserver(cats);
    initSectionReveal();
  }

  // ── IntersectionObserver — pill active ─────────────────────────────────────
  function initObserver(cats) {
    if (window._menuObserver) window._menuObserver.disconnect();
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const id = entry.target.id;
          document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
          const catId = id.startsWith('cat-') ? id.replace('cat-', '') : null;
          if (catId) {
            const pill = document.getElementById(`pill-${catId}`);
            if (pill) {
              pill.classList.add('active');
              pill.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
          }
        }
      });
    }, { rootMargin: '-30% 0px -60% 0px', threshold: 0 });
    cats.forEach(cat => {
      const el = document.getElementById(`cat-${cat.id}`);
      if (el) observer.observe(el);
    });
    window._menuObserver = observer;
  }

  // ── IntersectionObserver — apparition des sections au scroll ───────────────
  function initSectionReveal() {
    if (window._revealObserver) window._revealObserver.disconnect();
    const revealObs = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.remove('reveal-pending');
          entry.target.classList.add('revealed');
          revealObs.unobserve(entry.target);
        }
      });
    }, { threshold: 0.04 });
    document.querySelectorAll('.section.reveal-pending').forEach(el => revealObs.observe(el));
    window._revealObserver = revealObs;
  }

  function scrollToId(id) {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Lire les paramètres URL
  const urlParams = new URLSearchParams(window.location.search);
  const urlCarte = urlParams.get('carte');
  const fromAccueil = urlParams.get('from') === 'accueil';

  if (urlCarte) {
    carteActive = urlCarte;
    document.getElementById('brasero-banner').classList.toggle('visible', urlCarte === 'brasero');
  }

  loadCartes();

  // Animation d'entrée si on vient de accueil.html
  if (fromAccueil && !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    document.body.style.opacity = '0';
    document.body.style.transform = 'translateY(10px)';
    document.body.style.transition = 'none';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        document.body.style.transition = 'opacity 300ms ease, transform 300ms ease';
        document.body.style.opacity = '1';
        document.body.style.transform = 'translateY(0)';
      });
    });
    // Nettoie le paramètre ?from= de l'URL sans recharger
    const clean = new URL(window.location.href);
    clean.searchParams.delete('from');
    window.history.replaceState({}, '', clean.toString());
  }

  applyLangUI();
  loadData();
</script>
</body>
</html>
