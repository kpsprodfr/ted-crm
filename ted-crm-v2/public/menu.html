<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>La Carte — Le TED Chassieu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #16130f; }
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #f5efe4; min-height: 100dvh;
      background: linear-gradient(180deg, #16130f 0%, #221c15 100%);
    }
    a { color: #D9B845; } a:hover { color: #E8C547; }

    @keyframes ted-fade { from { opacity: 0; } to { opacity: 1; } }
    @keyframes ted-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.55; transform: scale(0.94); } }
    @keyframes ted-nav-in { from { transform: translateY(-100%); } to { transform: translateY(0); } }
    @keyframes ted-flamme {
      0%   { transform: scale(1) rotate(0deg); filter: drop-shadow(0 0 3px rgba(217,140,69,0.5)); }
      20%  { transform: scale(1.08, 0.94) rotate(-3deg); filter: drop-shadow(0 0 7px rgba(230,150,60,0.8)); }
      40%  { transform: scale(0.95, 1.07) rotate(2.5deg); filter: drop-shadow(0 0 4px rgba(217,140,69,0.55)); }
      60%  { transform: scale(1.05, 0.96) rotate(-2deg); filter: drop-shadow(0 0 8px rgba(240,160,70,0.85)); }
      80%  { transform: scale(0.97, 1.04) rotate(3deg); filter: drop-shadow(0 0 5px rgba(217,140,69,0.6)); }
      100% { transform: scale(1) rotate(0deg); filter: drop-shadow(0 0 3px rgba(217,140,69,0.5)); }
    }
    .ted-flamme { animation: ted-flamme 1.6s ease-in-out infinite; transform-origin: 50% 85%; }
    @keyframes ted-braise {
      0%   { transform: translateX(-4%) scale(1);    opacity: 0.3; }
      35%  { transform: translateX(2%) scale(1.08);  opacity: 0.5; }
      65%  { transform: translateX(-2%) scale(0.97); opacity: 0.35; }
      100% { transform: translateX(-4%) scale(1);    opacity: 0.3; }
    }
    @keyframes ted-braise2 {
      0%   { transform: translateX(3%) scale(1.05);  opacity: 0.4; }
      50%  { transform: translateX(-3%) scale(0.95); opacity: 0.22; }
      100% { transform: translateX(3%) scale(1.05);  opacity: 0.4; }
    }
    .ted-braise-a { animation: ted-braise 6.5s ease-in-out infinite; }
    .ted-braise-b { animation: ted-braise2 4.8s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { .ted-flamme, .ted-braise-a, .ted-braise-b { animation: none; } }

    .ted-reveal { opacity: 0; transform: translateY(10px); transition: opacity 0.5s ease, transform 0.5s ease; }
    .ted-reveal.ted-vu { opacity: 1; transform: translateY(0); }
    .ted-trace { transform: scaleX(0); transform-origin: center; transition: transform 0.6s ease 0.1s; }
    .ted-trace.ted-vu { transform: scaleX(1); }
    @media (prefers-reduced-motion: reduce) {
      .ted-reveal, .ted-trace { opacity: 1 !important; transform: none !important; transition: none !important; }
    }

    /* ── Fond photo flouté + voile ── */
    #fond-photo {
      position: fixed; inset: -50px; z-index: 0;
      background-image: url('assets/banner-tapas.jpg');
      background-size: cover; background-position: center;
      filter: blur(22px) brightness(0.5) saturate(1.1);
      transform: scale(1.14);
      animation: ted-fade 0.8s ease-out;
    }
    #fond-voile {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(180deg, rgba(20,16,11,0.82) 0%, rgba(20,16,11,0.86) 55%, rgba(16,13,9,0.92) 100%);
    }

    #wrap {
      position: relative; z-index: 1;
      max-width: 560px; margin: 0 auto;
      padding: 0 26px calc(32px + env(safe-area-inset-bottom));
    }

    /* ── Header ── */
    #topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 18px 0 0; }
    #topbar-logo { display: flex; align-items: center; gap: 11px; text-decoration: none; -webkit-tap-highlight-color: transparent; }
    #topbar-logo img { width: 38px; height: auto; }
    #topbar-nom { font-size: 14px; font-weight: 700; letter-spacing: 0.24em; color: #D9B845; display: block; }
    #topbar-sub { font-size: 8.5px; letter-spacing: 0.3em; color: rgba(245,239,228,0.5); display: block; margin-top: 2px; }

    #lang-selector { position: relative; }
    #lang-btn {
      display: flex; align-items: center; gap: 6px; min-height: 38px; padding: 8px 12px;
      background: none; border: 1px solid rgba(217,184,69,0.35); border-radius: 999px;
      color: #f5efe4; font-size: 12px; font-weight: 600; letter-spacing: 0.1em;
      cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent;
    }
    #lang-btn .chev { font-size: 8px; color: rgba(245,239,228,0.5); }
    #lang-menu {
      position: absolute; top: calc(100% + 8px); right: 0; z-index: 40;
      display: none; flex-direction: column; min-width: 136px; padding: 6px;
      background: rgba(26,22,16,0.97); border: 1px solid rgba(217,184,69,0.3); border-radius: 14px;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.6); animation: ted-fade 0.18s ease-out;
    }
    #lang-menu.open { display: flex; }
    .lang-opt {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      min-height: 42px; padding: 9px 12px; border: none; border-radius: 9px;
      background: transparent; color: rgba(245,239,228,0.85);
      font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; text-align: left;
      -webkit-tap-highlight-color: transparent;
    }
    .lang-opt .code { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; opacity: 0.6; }
    .lang-opt.active { background: #D9B845; color: #1c1710; }

    /* ── Titre ── */
    #titre-bloc { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 44px 0 0; text-align: center; }
    #titre-page {
      font-size: clamp(36px, 11vw, 52px); font-weight: 700;
      letter-spacing: 0.14em; text-indent: 0.14em; line-height: 1;
      color: #f5efe4; text-transform: uppercase;
    }
    .titre-filet { display: flex; align-items: center; gap: 10px; }
    .titre-filet .ligne { width: 36px; height: 1px; background: rgba(217,184,69,0.6); }
    .titre-filet .losange { width: 5px; height: 5px; border: 1px solid rgba(217,184,69,0.8); transform: rotate(45deg); }

    #btn-retour {
      display: none; align-items: center; gap: 10px; margin: 26px auto 0; padding: 0;
      background: none; border: none; color: #D9B845; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent;
    }
    #btn-retour.visible { display: flex; }

    /* ── Loader ── */
    #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; min-height: 36vh; }
    #loading img { width: 64px; height: auto; animation: ted-pulse 1.4s ease-in-out infinite; }
    #loading span { font-size: 12.5px; letter-spacing: 0.18em; color: rgba(245,239,228,0.55); }
    #error { display: none; text-align: center; padding: 40px 20px; color: rgba(245,239,228,0.7); font-size: 14px; }

    /* ── Menu du jour (seul bloc encadré) ── */
    .mjour-cadre {
      margin-top: 44px; padding: 26px 22px 24px;
      border: 1px solid rgba(217,184,69,0.45); border-radius: 4px;
      background: rgba(255,248,230,0.03);
    }
    .mjour-entete { display: flex; flex-direction: column; align-items: center; gap: 4px; text-align: center; }
    .mjour-badge {
      padding: 9px 18px; background: #E8C547; border-radius: 999px;
      font-size: 12px; font-weight: 800; letter-spacing: 0.24em; text-indent: 0.24em; color: #1c1710;
    }
    .mjour-formule { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-size: 15px; color: rgba(245,239,228,0.6); }
    .mjour-items { display: flex; flex-direction: column; gap: 20px; margin-top: 24px; }
    .mjour-item { display: flex; flex-direction: column; align-items: center; gap: 3px; text-align: center; }
    .mjour-label { font-size: 10px; font-weight: 600; letter-spacing: 0.26em; text-indent: 0.26em; color: rgba(245,239,228,0.45); }
    .mjour-nom { font-size: 16.5px; font-weight: 600; color: #f5efe4; line-height: 1.4; }
    .mjour-desc { font-size: 13px; line-height: 1.5; color: rgba(245,239,228,0.6); text-wrap: pretty; max-width: 40ch; }
    .mjour-prix { font-size: 14.5px; font-weight: 600; color: #D9B845; margin-top: 2px; }

    /* ── Suggestion du chef ── */
    .mchef-bloc { display: flex; flex-direction: column; align-items: center; gap: 2px; margin-top: 46px; text-align: center; }
    .mchef-titre { font-size: 13px; font-weight: 700; letter-spacing: 0.3em; text-indent: 0.3em; color: #D9B845; text-transform: uppercase; }
    .mchef-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0 0; }

    /* ── Bouton Carte Brasero ── */
    #brasero-btn {
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center; gap: 14px;
      width: 100%; margin-top: 44px; padding: 24px 20px;
      background: linear-gradient(90deg, rgba(42,26,15,0.75) 0%, rgba(66,38,18,0.75) 50%, rgba(42,26,15,0.75) 100%);
      border: 1px solid rgba(217,140,69,0.5); border-radius: 8px;
      cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent;
    }
    #brasero-btn:active { opacity: 0.8; transform: scale(0.99); }
    #brasero-btn .braise-a {
      position: absolute; left: 10%; right: 10%; bottom: -55%; height: 110%; pointer-events: none;
      background: radial-gradient(ellipse at 50% 100%, rgba(255,140,40,0.5) 0%, rgba(230,110,30,0.25) 40%, rgba(230,110,30,0) 70%);
    }
    #brasero-btn .braise-b {
      position: absolute; left: 25%; right: 25%; bottom: -45%; height: 95%; pointer-events: none;
      background: radial-gradient(ellipse at 50% 100%, rgba(255,190,80,0.45) 0%, rgba(255,150,50,0.18) 45%, rgba(255,150,50,0) 70%);
    }
    #brasero-btn .txt { position: relative; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    #brasero-btn .l1 { font-size: 17px; font-weight: 700; letter-spacing: 0.14em; text-indent: 0.14em; color: #f5efe4; line-height: 1.3; text-transform: uppercase; text-shadow: 0 1px 6px rgba(0,0,0,0.5); }
    #brasero-btn .l2 { font-size: 12px; font-weight: 500; letter-spacing: 0.08em; color: rgba(245,239,228,0.75); line-height: 1.3; text-shadow: 0 1px 6px rgba(0,0,0,0.5); }
    #brasero-btn .chevron { position: relative; font-size: 22px; color: #D98C45; flex-shrink: 0; line-height: 1; }

    /* ── Nav catégories fixe + fil de progression ── */
    #ted-progress {
      position: fixed; top: 0; left: 0; z-index: 22; height: 2px; width: 0%;
      background: linear-gradient(90deg, rgba(217,184,69,0.7), #E8C547);
      pointer-events: none; transition: width 0.1s linear; display: none;
    }
    #nav-cats {
      position: fixed; top: 2px; left: 0; right: 0; z-index: 20;
      padding: 10px 16px; display: none;
      background: rgba(22,18,13,0.95); border-bottom: 1px solid rgba(217,184,69,0.2);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      animation: ted-nav-in 0.22s ease-out;
      overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch;
      mask-image: linear-gradient(90deg, #000 0%, #000 92%, transparent 100%);
      -webkit-mask-image: linear-gradient(90deg, #000 0%, #000 92%, transparent 100%);
    }
    #nav-cats::-webkit-scrollbar { display: none; }
    #nav-cats.visible { display: block; }
    #nav-cats .rangee { display: flex; gap: 6px; width: max-content; margin: 0 auto; }
    .cat-pill {
      white-space: nowrap; padding: 8px 14px; min-height: 36px;
      border: none; border-radius: 999px;
      background: rgba(245,239,228,0.08); color: rgba(245,239,228,0.85);
      font-size: 12.5px; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: background 0.2s ease, color 0.2s ease; -webkit-tap-highlight-color: transparent;
    }
    .cat-pill:active { transform: scale(0.94); }
    .cat-pill.active { background: #D9B845; color: #1c1710; }

    /* ── Sections & plats ── */
    .section-titre { display: flex; align-items: center; gap: 14px; margin: 48px 0 10px; }
    .section-titre .filet { flex: 1; height: 1px; background: rgba(217,184,69,0.3); }
    .section-titre h3 {
      font-size: clamp(18px, 5.5vw, 24px); font-weight: 700; letter-spacing: 0.12em;
      color: #f5efe4; text-align: center; text-transform: uppercase; max-width: 78%;
    }
    .plat { display: flex; flex-direction: column; gap: 3px; padding: 15px 0 16px; border-bottom: 1px solid rgba(245,239,228,0.08); }
    .plat-ligne { display: flex; align-items: baseline; gap: 12px; }
    .plat-nom { font-size: 16px; font-weight: 600; color: #f5efe4; line-height: 1.4; }
    .plat-points { flex: 1; min-width: 14px; border-bottom: 1px dotted rgba(245,239,228,0.25); transform: translateY(-4px); }
    .plat-prix { font-size: 15px; font-weight: 600; color: #f5efe4; flex-shrink: 0; white-space: nowrap; }
    .plat-desc { font-size: 13px; line-height: 1.55; color: rgba(245,239,228,0.58); text-wrap: pretty; max-width: 46ch; }
    .plat-tag, .plat-accord { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-size: 14px; color: rgba(217,184,69,0.8); margin-top: 1px; }
    .plat-accord { color: rgba(217,184,69,0.7); }
    .section-note { padding: 12px 0 0; font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-size: 14px; color: rgba(245,239,228,0.5); text-align: center; }

    /* ── Bandeaux photo d'ambiance ── */
    .bandeau { position: relative; height: 150px; margin: 52px 0 0; border-radius: 4px; overflow: hidden; }
    .bandeau .img { position: absolute; inset: 0; background-size: cover; background-position: center; }
    .bandeau .voile { position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 50%, rgba(20,16,11,0.72) 0%, rgba(20,16,11,0.45) 55%, rgba(20,16,11,0.35) 100%); }
    .bandeau .phrase-wrap { position: relative; display: flex; align-items: center; justify-content: center; height: 100%; padding: 0 30px; text-align: center; }
    .bandeau .phrase {
      font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-weight: 600;
      font-size: 23px; color: #ffffff; line-height: 1.3;
      text-shadow: 0 2px 6px rgba(0,0,0,0.95), 0 0 24px rgba(0,0,0,0.8);
    }

    /* ── Origines ── */
    #origines-section { margin-top: 56px; display: none; }
    #origines-titre { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
    #origines-titre .filet { flex: 1; height: 1px; background: rgba(217,184,69,0.3); }
    #origines-titre h3 { font-size: 11px; font-weight: 700; letter-spacing: 0.3em; text-indent: 0.3em; color: #D9B845; text-align: center; }
    #origines-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 26px; }
    .origine-item { display: flex; flex-direction: column; gap: 1px; padding: 9px 0; border-bottom: 1px solid rgba(245,239,228,0.07); }
    .origine-item .viande { font-size: 13px; font-weight: 600; color: rgba(245,239,228,0.9); }
    .origine-item .prov { font-size: 12px; color: rgba(245,239,228,0.5); }

    /* ── Footer ── */
    footer { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 56px 0 8px; text-align: center; }
    footer img { width: 36px; height: auto; opacity: 0.85; }
    footer .nom { font-size: 12px; font-weight: 700; letter-spacing: 0.26em; text-indent: 0.26em; color: #D9B845; }
    footer .adresse { font-size: 12.5px; color: rgba(245,239,228,0.6); line-height: 1.5; }
    footer a.tel { font-size: 14px; font-weight: 600; color: #f5efe4; text-decoration: none; border-bottom: 1px solid rgba(217,184,69,0.5); padding-bottom: 1px; }

    /* ── Retour en haut ── */
    #back-top {
      position: fixed; right: 16px; bottom: calc(20px + env(safe-area-inset-bottom)); z-index: 30;
      width: 48px; height: 48px; border: 1px solid rgba(217,184,69,0.5); border-radius: 999px;
      background: rgba(26,22,16,0.92); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      color: #D9B845; font-size: 20px; font-weight: 600; cursor: pointer;
      display: none; animation: ted-fade 0.25s ease-out; -webkit-tap-highlight-color: transparent;
    }
    #back-top.visible { display: block; }
    #back-top:active { transform: scale(0.94); }

    .vue { animation: ted-fade 0.5s ease-out; }
  </style>
</head>
<body>

<div id="fond-photo"></div>
<div id="fond-voile"></div>

<div id="ted-progress"></div>
<nav id="nav-cats"><div class="rangee" id="nav-pills"></div></nav>

<div id="wrap">

  <header id="topbar">
    <a id="topbar-logo" href="/accueil.html">
      <img src="assets/logo-ours-or.png" alt="Le TED">
      <span>
        <span id="topbar-nom">LE TED</span>
        <span id="topbar-sub">RESTAURANT &amp; CLUB</span>
      </span>
    </a>
    <div id="lang-selector">
      <button id="lang-btn" onclick="toggleLangMenu()" aria-label="Choisir la langue">FR <span class="chev">▼</span></button>
      <div id="lang-menu">
        <button class="lang-opt" data-lang="fr" onclick="setLang('fr')">Français <span class="code">FR</span></button>
        <button class="lang-opt" data-lang="en" onclick="setLang('en')">English <span class="code">EN</span></button>
        <button class="lang-opt" data-lang="es" onclick="setLang('es')">Español <span class="code">ES</span></button>
        <button class="lang-opt" data-lang="it" onclick="setLang('it')">Italiano <span class="code">IT</span></button>
      </div>
    </div>
  </header>

  <div id="titre-bloc">
    <h1 id="titre-page">LA CARTE</h1>
    <div class="titre-filet"><span class="ligne"></span><span class="losange"></span><span class="ligne"></span></div>
  </div>

  <button id="btn-retour" onclick="basculerCarte()"><span style="font-size:17px;line-height:1;">←</span> <span id="btn-retour-txt"></span></button>

  <div id="loading">
    <img src="assets/logo-ours-or.png" alt="">
    <span id="loading-txt">Chargement de la carte…</span>
  </div>
  <div id="error"></div>

  <div id="specials-container" style="display:none;"></div>
  <div id="content" style="display:none;"></div>

  <div id="origines-section">
    <div id="origines-titre"><div class="filet ted-trace"></div><h3 id="origines-h3">ORIGINE DES VIANDES</h3><div class="filet ted-trace"></div></div>
    <div id="origines-grid"></div>
  </div>

  <footer>
    <img src="assets/logo-ours-or.png" alt="">
    <span class="nom">LE TED</span>
    <span class="adresse">28 Av. des Frères Montgolfier, 69680 Chassieu</span>
    <a class="tel" href="tel:+33478906780">04 78 90 67 80</a>
  </footer>

</div>

<button id="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Retour en haut">↑</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  // ── Configuration Supabase (clé publique, protégée par RLS) ────────────────
  // Timeout global 10 s sur tous les fetch de la page (résilience réseau)
  if (window.AbortSignal && AbortSignal.timeout) {
    const _fetch = window.fetch.bind(window);
    window.fetch = (url, opts = {}) => _fetch(url, { ...opts, signal: opts.signal || AbortSignal.timeout(10000) });
  }
  const SUPA_URL = 'https://mwpfaytccypvdrgapptk.supabase.co';
  const SUPA_KEY = 'sb_publishable_4-uVtQtXd0jLGkNAFsx4yw_ni17DzN_';

  // ── État ────────────────────────────────────────────────────────────────────
  // Deux cartes séparées, jamais fusionnées : 'restaurant' (normale) / 'brasero'
  let carteActive = 'restaurant';
  let allCartes = [{ slug:'restaurant', nom:'Restaurant' }, { slug:'brasero', nom:'Brasero' }];
  let allCategories = [];
  let allProduits = [];
  let entreeJour = null, platJour = null, dessertJour = null, formuleJour = null, suggestionJour = null;

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatPrix(p) {
    if (!p) return '';
    const s = String(p).trim();
    if (!s || s.includes('€')) return s;
    return /^[\d]+([,.][\d]{1,2})?$/.test(s) ? s + ' €' : s;
  }

  // ── Langue : UI + phrases d'ambiance (le contenu de la carte vient de la base) ─
  const UI = {
    fr: {
      titre:'La Carte', braseroTitre:'Carte Brasero', chargement:'Chargement de la carte…',
      retourCarte:'Retour à la carte', origineTitre:'ORIGINE DES VIANDES',
      badgeMenuJour:'MENU DU JOUR', formuleComplete:'FORMULE COMPLÈTE', suggestionChef:'Suggestion du chef',

  };
  let lang = localStorage.getItem('ted_langue') || 'fr';
  if (!['fr', 'en', 'es', 'it'].includes(lang)) lang = 'fr';

  function tUI(k) { return (UI[lang] || UI.fr)[k] || UI.fr[k] || k; }
  function tItem(item, field) {
    if (lang === 'fr') return item[field] || '';
    return item[field + '_' + lang] || item[field] || '';
  }

  function applyLangUI() {
    document.getElementById('lang-btn').innerHTML = lang.toUpperCase() + ' <span class="chev">▼</span>';
    document.querySelectorAll('.lang-opt').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));

    if (allCategories.length) renderMenu();
  }

  function toggleLangMenu() { document.getElementById('lang-menu').classList.toggle('open'); }
  function setLang(l) {
    lang = l;
    localStorage.setItem('ted_langue', l);
    document.getElementById('lang-menu').classList.remove('open');
    applyLangUI();
  }
  document.addEventListener('click', e => {
    const sel = document.getElementById('lang-selector');
    if (sel && !sel.contains(e.target)) document.getElementById('lang-menu').classList.remove('open');

  // ── Cartes dynamiques (libellés depuis menu_cartes) ─────────────────────────
  async function loadCartes() {
    try {
      const r = await fetch(
        `${SUPA_URL}/rest/v1/menu_cartes?select=nom,slug,ordre&visible=eq.true&order=ordre`,
        { headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` } }
      );
      if (r.ok) {
        const data = await r.json();
        if (data && data.length > 0) allCartes = data;
      }
    } catch(e) {} // silencieux — fallback hardcodé
  }

  // ── Cache localStorage (TTL 5 min, revalidation silencieuse > 60s) ─────────
  const CACHE_KEY = 'ted_menu_v3';
  const CACHE_TTL  = 5 * 60 * 1000;
  const CACHE_STALE =     60 * 1000;

  function cacheGet() {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      const { ts, cats, prods, plats } = JSON.parse(raw);
      if (Date.now() - ts > CACHE_TTL) { localStorage.removeItem(CACHE_KEY); return null; }
      return { cats, prods, plats, age: Date.now() - ts };
    } catch(e) { return null; }
  }
  function cacheSet(cats, prods, plats) {
    try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), cats, prods, plats })); } catch(e) {}
  }

  // ── Fetch Supabase — AUCUNE limite, AUCUN filtre qui écarte des plats ───────
  async function fetchJSON(table, params = '') {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${params}`, {
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` }
    });
    if (!r.ok) throw new Error(`Erreur ${r.status} sur ${table}`);
    return r.json();
  }

  const CAT_COLS   = 'id,nom,nom_en,nom_es,nom_it,carte,ordre,visible';
  const PROD_COLS  = 'id,nom,nom_en,nom_es,nom_it,description,description_en,description_es,description_it,prix,prix_detail,accord_vin,badges,ordre,disponible,carte,categorie_id';
  const CAT_COLS_FR  = 'id,nom,carte,ordre,visible';
  const PROD_COLS_FR = 'id,nom,description,prix,prix_detail,accord_vin,badges,ordre,disponible,carte,categorie_id';
  const PLAT_COLS  = 'id,nom,description,prix,type,carte,actif';

  async function fetchFromNetwork(silent = false) {
    let cats, prods, plats;
    try {
      [cats, prods, plats] = await Promise.all([
        fetchJSON('menu_categories', `select=${CAT_COLS}&order=ordre&limit=10000`),
        fetchJSON('menu_produits',   `select=${PROD_COLS}&disponible=eq.true&order=ordre&limit=10000`),
        fetchJSON('menu_plat_jour',  `select=${PLAT_COLS}&limit=1000`)
      ]);
    } catch(e) {
      // Colonnes de traduction absentes → fallback FR uniquement
      [cats, prods, plats] = await Promise.all([
        fetchJSON('menu_categories', `select=${CAT_COLS_FR}&order=ordre&limit=10000`),
        fetchJSON('menu_produits',   `select=${PROD_COLS_FR}&disponible=eq.true&order=ordre&limit=10000`),
        fetchJSON('menu_plat_jour',  `select=${PLAT_COLS}&limit=1000`)
      ]);
    }
    allCategories = cats;
    allProduits = prods;
    updatePlatJour(plats);
    cacheSet(cats, prods, plats);
    if (!silent) document.getElementById('loading').style.display = 'none';
    renderMenu();
  }

  async function loadData() {
    const hit = cacheGet();
    if (hit) {
      allCategories = hit.cats;
      allProduits = hit.prods;
      updatePlatJour(hit.plats);
      document.getElementById('loading').style.display = 'none';
      renderMenu();
      if (hit.age > CACHE_STALE) fetchFromNetwork(true).catch(() => {});
      return;
    }
    try {
      await fetchFromNetwork(false);
    } catch(e) {
      document.getElementById('loading').style.display = 'none';
      const err = document.getElementById('error');
      err.textContent = tUI('erreur');
      err.style.display = 'block';
    }
  }

  // ── Polling menu du jour — mise à jour en direct toutes les 30s ────────────
  async function pollPlatJour() {
    try {
      const plats = await fetchJSON('menu_plat_jour', `select=${PLAT_COLS}&limit=1000`);
      const sig = JSON.stringify(plats);
      if (sig !== pollPlatJour._last) {
        pollPlatJour._last = sig;
        updatePlatJour(plats);
        renderSpecials();
        const hit = cacheGet();
        if (hit) cacheSet(hit.cats, hit.prods, plats);
      }
    } catch(e) { /* silencieux */ }
  }
  pollPlatJour._last = null;
  setInterval(pollPlatJour, 30000);

  // ── bfcache : retour navigateur ─────────────────────────────────────────────
  window.addEventListener('pageshow', e => {
    if (e.persisted && allCategories.length === 0) {
      const hit = cacheGet();
      if (hit) {
        allCategories = hit.cats; allProduits = hit.prods;
        updatePlatJour(hit.plats);
        document.getElementById('loading').style.display = 'none';
        renderMenu();
      } else {
        loadData();
      }
    }
  });

  function updatePlatJour(plats) {
    entreeJour     = plats.find(p => p.type === 'entree'     && p.carte === carteActive) || null;
    platJour       = plats.find(p => p.type === 'plat'       && p.carte === carteActive) || null;
    dessertJour    = plats.find(p => p.type === 'dessert'    && p.carte === carteActive) || null;
    formuleJour    = plats.find(p => p.type === 'formule'    && p.carte === carteActive) || null;
    suggestionJour = plats.find(p => p.type === 'suggestion' && p.carte === carteActive) || null;
  }

  // ── Menu du jour + Suggestion du chef (pilotés depuis le back-office) ──────
  function renderSpecials() {
    const container = document.getElementById('specials-container');
    if (!container) return;

    const rows = [
      { key: 'entree',  item: entreeJour },
      { key: 'plat',    item: platJour },
      { key: 'dessert', item: dessertJour },
    ];
    const menuVisible = rows.some(r => r.item && r.item.actif && r.item.nom);
    const suggestionVisible = suggestionJour && suggestionJour.actif && suggestionJour.nom;

    if (!menuVisible && !suggestionVisible) { container.style.display = 'none'; container.innerHTML = ''; return; }
    container.style.display = 'block';

    const labels = tUI('labels');
    let html = '';

    // MENU DU JOUR — le seul bloc encadré de la page
    if (menuVisible) {
      html += `<div class="mjour-cadre">
        <div class="mjour-entete">
          <h2 class="mjour-badge">${esc(tUI('badgeMenuJour'))}</h2>
          ${formuleJour && formuleJour.actif !== false && formuleJour.prix ? `<span class="mjour-formule">${esc(tUI('formuleComplete'))} · ${esc(formatPrix(formuleJour.prix))}</span>` : ''}
        </div>
        <div class="mjour-items">`;
      rows.forEach(({ key, item }) => {
        if (!item || !item.actif || !item.nom) return;
        html += `<div class="mjour-item">
          <span class="mjour-label">${esc(labels[key] || key.toUpperCase())}</span>
          <span class="mjour-nom">${esc(item.nom)}</span>
          ${item.description ? `<span class="mjour-desc">${esc(item.description)}</span>` : ''}
          ${item.prix ? `<span class="mjour-prix">${esc(formatPrix(item.prix))}</span>` : ''}
        </div>`;
      });
      html += `</div></div>`;
    }

    // SUGGESTION DU CHEF — sans cadre
    if (suggestionVisible) {
      html += `<div class="mchef-bloc">
        <h2 class="mchef-titre">${esc(tUI('suggestionChef'))}</h2>
        <div class="mchef-item">
          <span class="mjour-nom">${esc(suggestionJour.nom)}</span>
          ${suggestionJour.description ? `<span class="mjour-desc">${esc(suggestionJour.description)}</span>` : ''}
          ${suggestionJour.prix ? `<span class="mjour-prix">${esc(formatPrix(suggestionJour.prix))}</span>` : ''}
        </div>
      </div>`;
    }

    container.innerHTML = html;
  }

  // ── Bandeaux photo d'ambiance par catégorie (assets locaux uniquement) ─────
  function bandeauPour(nomCat) {
    const n = (nomCat || '').toLowerCase();
    if (/dessert/.test(n))                return { img: 'assets/banner-desserts.webp',       cle: 'desserts' };
    if (/vin/.test(n) && /verre/.test(n)) return { img: 'assets/banner-boissons.webp',       cle: 'vinsverre' };
    if (/club/.test(n))                   return { img: 'assets/fond-festif.jpg',            cle: 'club' };
    if (/tapas/.test(n))                  return { img: 'assets/banner-planches.jpg',        cle: 'tapas' };
    if (/signature/.test(n))              return { img: 'assets/banner-plat-signature.jpg',  cle: 'signatures' };
    return null;
  }

  // ── Bascule carte normale ↔ Brasero (jamais fusionnées) ────────────────────
  function basculerCarte(force) {
    carteActive = force || (carteActive === 'brasero' ? 'restaurant' : 'brasero');
    document.getElementById('titre-page').textContent = (carteActive === 'brasero' ? tUI('braseroTitre') : tUI('titre')).toUpperCase();
    document.getElementById('btn-retour').classList.toggle('visible', carteActive === 'brasero');
    const hit = cacheGet();
    if (hit) updatePlatJour(hit.plats);
    window.scrollTo({ top: 0 });
    renderMenu();
  }

  // ── Rendu principal ─────────────────────────────────────────────────────────
  function renderMenu() {
    renderSpecials();
    const content = document.getElementById('content');
    content.style.display = 'block';
    content.className = 'vue';

    const isPlatJourCat = (nom) => /plat du jour|dessert du jour/i.test(nom);
    const cats = allCategories.filter(c =>
      c.visible !== false &&
      (c.carte === carteActive || c.carte === 'les-deux') &&
      !isPlatJourCat(c.nom)
    );

    const FOOD_CATS = ['Formules midi','Tapas','Nos planches','Salades','Plats froids','Plats signatures','Suggestions','Fromages','Desserts'];
    const isFoodSection = (nom) => FOOD_CATS.some(f => nom.toLowerCase().includes(f.toLowerCase()) || f.toLowerCase().includes(nom.toLowerCase()));

    let html = '';

    // Bandeau + phrase d'ambiance en tête de la carte Brasero
    if (carteActive === 'brasero') {
      html += `<div class="bandeau" style="margin-top:34px;">
        <div class="img" style="background-image:url('assets/banner-brasero.webp');"></div>
        <div class="voile" style="background:linear-gradient(180deg, rgba(20,16,11,0.45) 0%, rgba(20,16,11,0.2) 45%, rgba(20,16,11,0.65) 100%);"></div>
        <div class="phrase-wrap"><span class="phrase ted-reveal" style="color:#f2ce9e;font-weight:500;font-size:21px;">${esc(tUI('phraseBrasero'))}</span></div>
      </div>`;
    }

    // Pills de navigation (toutes les catégories non vides, ordre Supabase strict)
    let pillsHtml = '';
    let hasFood = false;
    let noteInseree = false;

    cats.forEach(cat => {
      const ps = allProduits.filter(p => p.categorie_id === cat.id && (p.carte === carteActive || p.carte === 'les-deux'));
      if (ps.length === 0) return;

      pillsHtml += `<button class="cat-pill" id="pill-${cat.id}" onclick="allerCat('${cat.id}')">${esc(tItem(cat, 'nom'))}</button>`;

      // Note légale après le dernier bloc "nourriture", avant les boissons
      if (hasFood && !isFoodSection(cat.nom) && !noteInseree) {
        html += `<p class="section-note">${esc(tUI('noteLegale'))}</p>`;
        noteInseree = true;
      }
      if (isFoodSection(cat.nom)) hasFood = true;

      // Bandeau photo d'ambiance avant certaines catégories (carte normale)
      const bd = carteActive === 'restaurant' ? bandeauPour(cat.nom) : null;
      if (bd) {
        const phrase = (tUI('phrases') || {})[bd.cle] || '';
        html += `<div class="bandeau">
          <div class="img" style="background-image:url('${bd.img}');"></div>
          <div class="voile"></div>
          <div class="phrase-wrap"><span class="phrase ted-reveal">${esc(phrase)}</span></div>
        </div>`;
      }

      html += `<div id="cat-${cat.id}" data-catid="${cat.id}" class="section-bloc">
        <div class="section-titre">
          <div class="filet ted-trace"></div>
          <h3>${esc(tItem(cat, 'nom'))}</h3>
          <div class="filet ted-trace"></div>
        </div>`;

      ps.forEach((p, i) => {
        const pNom  = tItem(p, 'nom');
        const pDesc = tItem(p, 'description');
        const badges = (p.badges || []).map(b => `<span class="plat-tag">${esc(b)}</span>`).join('');
        const prix = p.prix_detail || formatPrix(p.prix);
        html += `<div class="plat ted-reveal" style="transition-delay:${Math.min(i * 45, 320)}ms;">
          <div class="plat-ligne">
            <span class="plat-nom">${esc(pNom)}</span>
            <span class="plat-points"></span>
            ${prix ? `<span class="plat-prix">${esc(prix)}</span>` : ''}
          </div>
          ${pDesc ? `<span class="plat-desc">${esc(pDesc)}</span>` : ''}
          ${badges}
          ${p.accord_vin ? `<span class="plat-accord">${esc(p.accord_vin)}</span>` : ''}
        </div>`;
      });

      html += `</div>`;
    });

    if (hasFood && !noteInseree) {
      html += `<p class="section-note">${esc(tUI('noteLegale'))}</p>`;
    }

    // Accès à la carte Brasero — la seule teinte chaude de la page
    if (carteActive === 'restaurant') {
      html += `<button id="brasero-btn" onclick="basculerCarte('brasero')" aria-label="${esc(tUI('braseroBtnTitre'))}">
        <span class="braise-a"></span>
        <span class="braise-b"></span>
        <svg class="ted-flamme" width="28" height="28" viewBox="0 0 24 24" fill="rgba(217,140,69,0.15)" stroke="#D98C45" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path></svg>
        <span class="txt">
          <span class="l1">${esc(tUI('braseroBtnTitre'))}</span>
          <span class="l2">${esc(tUI('braseroBtnSous'))}</span>
        </span>
        <span class="chevron">›</span>
      </button>`;
    }

    content.innerHTML = html;
    document.getElementById('nav-pills').innerHTML = pillsHtml;
    scanReveals();
  }

  function allerCat(id) {
    const el = document.getElementById('cat-' + id);
    if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 70, behavior: 'smooth' });
  }

  // ── Révélations au scroll (IntersectionObserver, jamais bloquant) ───────────
  let _io = null;
  function scanReveals() {
    if (_io === null && 'IntersectionObserver' in window) {
      _io = new IntersectionObserver((entries) => {
        for (const e of entries) {
          if (e.isIntersecting) { e.target.classList.add('ted-vu'); _io.unobserve(e.target); }
        }
      }, { rootMargin: '0px 0px 10% 0px', threshold: 0.01 });
    }
    const vh = window.innerHeight || 800;
    document.querySelectorAll('.ted-reveal:not(.ted-vu), .ted-trace:not(.ted-vu)').forEach((el) => {
      const r = el.getBoundingClientRect();
      if (!_io || (r.top < vh + 40 && r.bottom > -40)) el.classList.add('ted-vu');
      else _io.observe(el);
    });
  }

  // ── Scroll : nav fixe, scroll-spy, fil de progression, retour en haut ──────
  window.addEventListener('scroll', () => {
    const y = window.scrollY;
    document.getElementById('back-top').classList.toggle('visible', y > 400);

    const nav = document.getElementById('nav-cats');
    const prog = document.getElementById('ted-progress');
    const navOn = y > 260 && carteActive === 'restaurant';
    nav.classList.toggle('visible', navOn);
    prog.style.display = navOn ? 'block' : 'none';

    const doc = document.documentElement;
    const pct = Math.min(1, y / Math.max(1, doc.scrollHeight - window.innerHeight));
    prog.style.width = (pct * 100).toFixed(1) + '%';

    // Scroll-spy : dernière catégorie dont le haut est passé sous la barre
    let active = null;
    document.querySelectorAll('.section-bloc').forEach(el => {
      if (el.getBoundingClientRect().top <= 150) active = el.dataset.catid;
    });
    document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
    if (active) {
      const pill = document.getElementById('pill-' + active);
      if (pill) {
        pill.classList.add('active');
        const scroller = document.getElementById('nav-cats');
        scroller.scrollTo({ left: pill.offsetLeft - scroller.clientWidth / 2 + pill.clientWidth / 2, behavior: 'smooth' });
      }
    }
  }, { passive: true });

  // ── Origine des viandes (données existantes inchangées) ────────────────────
  async function loadOrigines() {
    try {
      const r = await fetch(
        `${SUPA_URL}/rest/v1/menu_origines?select=produit,origine&order=ordre&limit=10000`,
        { headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` } }
      );
      if (!r.ok) return;
      const data = await r.json();
      if (!data || data.length === 0) return;
      document.getElementById('origines-grid').innerHTML = data.map(o =>
        `<div class="origine-item"><span class="viande">${esc(o.produit)}</span><span class="prov">${esc(o.origine)}</span></div>`
      ).join('');
      document.getElementById('origines-section').style.display = 'block';
      scanReveals();
    } catch(e) {}
  }
  loadOrigines();

  // ── Init : URL (#brasero / ?carte=brasero), langue, entrée depuis l'accueil ─
  const urlParams = new URLSearchParams(window.location.search);
  const fromAccueil = urlParams.get('from') === 'accueil';
  if (/brasero/i.test(window.location.hash) || urlParams.get('carte') === 'brasero') {
    carteActive = 'brasero';
    document.getElementById('btn-retour').classList.add('visible');
  }

  if (fromAccueil && !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    document.body.style.opacity = '0';
    document.body.style.transform = 'translateY(10px)';
    document.body.style.transition = 'none';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        document.body.style.transition = 'opacity 300ms ease, transform 300ms ease';
        document.body.style.opacity = '1';
        document.body.style.transform = 'translateY(0)';
      });
    });
    const clean = new URL(window.location.href);
    clean.searchParams.delete('from');
    window.history.replaceState({}, '', clean.toString());
  }

  applyLangUI();
  loadCartes();
  loadData();

  // ── Supabase Realtime — mise à jour instantanée sans rechargement ──────────
  (function initRealtime() {
    if (typeof supabase === 'undefined') return;
    const client = supabase.createClient(SUPA_URL, SUPA_KEY);

    function fadeRefreshContent() {
      const content = document.getElementById('content');
      const specials = document.getElementById('specials-container');
      [content, specials].forEach(el => {
        if (!el) return;
        el.style.transition = 'opacity 200ms ease';
        el.style.opacity = '0';
        setTimeout(() => { el.style.opacity = '1'; }, 220);
      });
    }

    client
      .channel('menu-live')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'menu_produits' }, async () => {
        await fetchFromNetwork(true);
        fadeRefreshContent();
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'menu_categories' }, async () => {
        await fetchFromNetwork(true);
        fadeRefreshContent();
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'menu_plat_jour' }, async () => {
        await pollPlatJour();
        fadeRefreshContent();
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'menu_origines' }, () => loadOrigines())
      .subscribe();
  })();
</script>
</body>
</html>
