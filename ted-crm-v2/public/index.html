<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#111111" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="TED CRM" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>TED — Fichier Clients</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; background: #f8f8f8; }
      input, select, textarea, button { font-family: inherit; }
      input:focus, select:focus, textarea:focus {
        border-color: #E8C547 !important;
        outline: none;
        box-shadow: 0 0 0 2px rgba(232,197,71,0.2);
      }
      html, body { overflow-x: hidden; max-width: 100vw; }
      @media (min-width: 768px) { body { overflow: hidden; } }
      @keyframes pulse-btn {
        0% { box-shadow: 0 0 0 0 rgba(232, 197, 71, 0.7); }
        70% { box-shadow: 0 0 0 14px rgba(232, 197, 71, 0); }
        100% { box-shadow: 0 0 0 0 rgba(232, 197, 71, 0); }
      }
      .btn-pulse {
        animation: pulse-btn 2s infinite;
      }
      @keyframes alarm-blink {
        0%, 49% { background: #dc2626; }
        50%, 100% { background: #b91c1c; }
      }
      .alarm-blink {
        animation: alarm-blink 0.6s infinite;
      }
      @keyframes calClose {
        0% { opacity: 1; transform: translateY(0) scale(1); }
        30% { opacity: 1; transform: translateY(-2px) scale(1.01); }
        100% { opacity: 0; transform: translateY(-12px) scale(0.97); }
      }
      @keyframes dateFlashPulse {
        0% { transform: scale(1); }
        40% { transform: scale(0.88); background: #111; color: #E8C547; }
        70% { transform: scale(1.05); }
        100% { transform: scale(1); }
      }
      .cal-fermeture {
        animation: calClose 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        transform-origin: top center;
      }
      .date-flash {
        animation: dateFlashPulse 0.2s ease forwards;
      }
      @media print {
        body * { visibility: hidden; }
        #print-tableau, #print-tableau * { visibility: visible; }
        #print-tableau { position: fixed; top: 0; left: 0; width: 100%; padding: 24px; }
        .print-only { display: block !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => { console.log('SW enregistré:', reg.scope); window._swReg = reg; })
          .catch(err => console.error('SW erreur:', err));
      });
    }
  </script>
  </body>
</html>
