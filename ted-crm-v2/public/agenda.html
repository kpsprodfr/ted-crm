<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ajouter à mon agenda</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body { background: #111; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .card { background: #fff; border-radius: 16px; padding: 28px 24px; max-width: 360px; width: 100%; }
    h2 { font-size: 18px; font-weight: 800; color: #111; margin-bottom: 6px; text-align: center; }
    p { font-size: 13px; color: #888; text-align: center; margin-bottom: 24px; }
    .btn { display: flex; align-items: center; gap: 12px; width: 100%; padding: 14px 16px; border-radius: 10px; border: 1.5px solid #eee; background: #fff; text-decoration: none; color: #111; font-size: 15px; font-weight: 600; margin-bottom: 10px; cursor: pointer; transition: background 0.15s; }
    .btn:hover { background: #f5f5f5; }
    .btn img, .btn svg { width: 28px; height: 28px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="card">
    <h2>📅 Ajouter à mon agenda</h2>
    <p id="details"></p>

    <!-- Google Calendar -->
    <a id="google-btn" class="btn" target="_blank">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="8" width="40" height="36" rx="4" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
        <rect x="4" y="8" width="40" height="10" rx="4" fill="#4285F4"/>
        <rect x="4" y="14" width="40" height="4" fill="#4285F4"/>
        <rect x="14" y="4" width="4" height="10" rx="2" fill="#4285F4"/>
        <rect x="30" y="4" width="4" height="10" rx="2" fill="#4285F4"/>
        <text x="24" y="38" text-anchor="middle" font-size="14" font-weight="800" fill="#4285F4" font-family="Arial">31</text>
      </svg>
      Google Agenda
    </a>

    <!-- Apple Calendar -->
    <a id="apple-btn" class="btn" target="_blank">
      <svg viewBox="0 0 814 1000" xmlns="http://www.w3.org/2000/svg" width="28" height="28">
        <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-37.3-150.3-93.8C27.8 752.1 1 651.1 1 549.1c0-175.2 113.4-268.4 224.5-268.4 60.1 0 109.9 39.5 147.3 39.5 35.7 0 91.4-41.8 159.8-41.8 25.5 0 108.2 2.6 168.9 75.4zm-225-97.9c30.7-36.5 52.4-87.2 52.4-137.9 0-7.1-.6-14.3-1.9-20.1-49.3 1.9-107.5 33-142.9 75.4-27.5 31.4-53.7 82.1-53.7 133.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 44.4 0 98.8-29.5 130.6-70.3z" fill="#111"/>
      </svg>
      Apple Calendrier
    </a>

    <!-- Outlook -->
    <a id="outlook-btn" class="btn" target="_blank">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="outBg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#2196F3"/>
            <stop offset="100%" stop-color="#1565C0"/>
          </linearGradient>
          <linearGradient id="outFront" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#42A5F5"/>
            <stop offset="100%" stop-color="#1976D2"/>
          </linearGradient>
        </defs>
        <!-- envelope body -->
        <rect x="4" y="14" width="28" height="22" rx="3" fill="url(#outBg)"/>
        <!-- right flap -->
        <polygon points="32,14 44,20 44,36 32,36" fill="url(#outFront)"/>
        <!-- arrow pointing right -->
        <polygon points="44,20 32,27 44,36" fill="#1565C0" opacity="0.4"/>
        <polygon points="32,14 44,20 32,27" fill="#E3F2FD" opacity="0.3"/>
        <!-- O badge -->
        <rect x="2" y="26" width="20" height="20" rx="4" fill="#1565C0"/>
        <text x="12" y="41" text-anchor="middle" font-size="14" font-weight="900" fill="#fff" font-family="Arial">O</text>
      </svg>
      Outlook
    </a>
  </div>

  <script>
    const p = new URLSearchParams(window.location.search);
    const date = p.get('date') || '';
    const heure = p.get('heure') || '19:00';
    const nb = p.get('nb') || '1';
    const service = p.get('service') || 'soir';

    document.getElementById('details').textContent =
      `${new Date(date).toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'})} à ${heure} — ${nb} personne(s)`;

    const dateStr = date.replace(/-/g,'');
    const [hStart, mStart] = heure.split(':');
    const hEnd = String(parseInt(hStart) + 2).padStart(2,'0');
    const calStart = `${dateStr}T${hStart}${mStart}00`;
    const calEnd = `${dateStr}T${hEnd}${mStart}00`;
    const titre = encodeURIComponent('Réservation Le TED');
    const lieu = encodeURIComponent('28 Av. des Frères Montgolfier, 69680 Chassieu');
    const desc = encodeURIComponent(`Réservation au TED pour ${nb} personne(s)`);

    document.getElementById('google-btn').href =
      `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${titre}&dates=${calStart}/${calEnd}&location=${lieu}&details=${desc}`;

    document.getElementById('apple-btn').href =
      `https://ted-crm.pages.dev/ical.html?date=${date}&heure=${encodeURIComponent(heure)}&nb=${nb}`;

    document.getElementById('outlook-btn').href =
      `https://outlook.live.com/calendar/0/deeplink/compose?subject=${titre}&startdt=${date}T${hStart}:${mStart}:00&enddt=${date}T${hEnd}:${mStart}:00&location=${lieu}`;
  </script>
</body>
</html>
