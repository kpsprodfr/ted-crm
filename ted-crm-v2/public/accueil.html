<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Le TED — Chassieu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }

    body {
      background: #111;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 160px;
    }

    .anim {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 400ms ease, transform 400ms ease;
    }
    .anim.visible { opacity: 1; transform: translateY(0); }
    @media (prefers-reduced-motion: reduce) {
      .anim { opacity: 1 !important; transform: none !important; transition: none !important; }
    }

    /* ── Hero ──────────────────────────────────────────────────────────────── */
    #hero {
      display: flex; flex-direction: column; align-items: center;
      padding: 64px 24px 32px; text-align: center;
    }
    #logo-img {
      width: 110px; height: 110px; object-fit: contain;
      clip-path: inset(100% 0 0 0);
      transition: clip-path 1.2s cubic-bezier(0.22, 1, 0.36, 1), opacity 400ms ease;
      opacity: 0;
    }
    #logo-img.visible { clip-path: inset(0% 0 0 0); opacity: 1; }
    @media (prefers-reduced-motion: reduce) {
      #logo-img { clip-path: none !important; opacity: 1 !important; transition: none !important; }
    }
    #hero-title { font-size: 36px; font-weight: 900; color: #E8C547; letter-spacing: 3px; margin-top: 20px; }
    #hero-sub   { font-size: 12px; color: #666; letter-spacing: 2px; margin-top: 6px; text-transform: uppercase; }
    #hero-line  { width: 40px; height: 2px; background: #E8C547; border-radius: 2px; margin-top: 18px; }

    /* ── Soirées ────────────────────────────────────────────────────────────── */
    #soirees-section { width: 100%; max-width: 420px; padding: 0 24px; margin-top: 36px; }
    #soirees-label {
      font-size: 11px; font-weight: 700; color: #E8C547;
      letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 16px;
    }
    .soiree-item {
      display: flex; align-items: center;
      padding: 14px 8px; border-bottom: 1px solid #222;
      cursor: pointer; border-radius: 8px; margin: 0 -8px;
      transition: background 150ms ease;
    }
    .soiree-item:last-child { border-bottom: none; }
    .soiree-item:active { background: rgba(255,255,255,0.05); }
    .soiree-info { flex: 1; min-width: 0; }
    .soiree-nom  { font-size: 15px; font-weight: 600; color: #fff; }
    .soiree-when { font-size: 12px; color: #555; margin-top: 3px; }
    .soiree-chevron { font-size: 16px; color: #444; flex-shrink: 0; margin-left: 12px; }

    /* ── Sélecteur de langue (flottant haut droite) ──────────────────────── */
    #lang-selector {
      position: fixed; top: 14px; right: 16px; z-index: 300;
    }
    #lang-btn {
      background: rgba(255,255,255,0.07); border: 1px solid #333;
      color: #aaa; font-size: 11px; font-weight: 700; letter-spacing: 1px;
      padding: 5px 10px; border-radius: 6px; cursor: pointer;
      transition: background 150ms ease; font-family: inherit;
    }
    #lang-btn:hover { background: rgba(255,255,255,0.13); color: #fff; }
    #lang-menu {
      position: absolute; top: calc(100% + 6px); right: 0;
      background: #1c1c1c; border: 1px solid #333; border-radius: 8px;
      overflow: hidden; min-width: 56px; display: none; z-index: 400;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    #lang-menu.open { display: block; }
    .lang-opt {
      display: block; width: 100%; padding: 8px 14px;
      color: #bbb; font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
      background: none; border: none; cursor: pointer; text-align: left;
      transition: background 100ms ease; font-family: inherit;
    }
    .lang-opt:hover { background: #2a2a2a; color: #fff; }
    .lang-opt.active { color: #E8C547; }

    /* ── Boutons ────────────────────────────────────────────────────────────── */
    #cta-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 16px 20px calc(16px + env(safe-area-inset-bottom, 0px));
      background: linear-gradient(to bottom, transparent 0%, #111 28%);
      display: flex; flex-direction: column; gap: 10px;
      max-width: 480px; margin: 0 auto;
    }
    .btn-cta {
      display: block; width: 100%; padding: 16px; border-radius: 14px;
      font-size: 15px; font-weight: 700; text-align: center;
      text-decoration: none; border: 2px solid #E8C547;
      transition: opacity 150ms ease;
    }
    .btn-cta:active { opacity: 0.75; }
    .btn-primary { background: #E8C547; color: #111; }
    .btn-outline  { background: transparent; color: #E8C547; }

    /* ── Popup soirée ───────────────────────────────────────────────────────── */
    #popup-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.78);
      display: flex; align-items: center; justify-content: center; padding: 24px;
      opacity: 0; transition: opacity 200ms ease; pointer-events: none;
    }
    #popup-overlay.open { opacity: 1; pointer-events: all; }

    #popup-card {
      background: linear-gradient(160deg, #1c1c1c 0%, #111 100%);
      border: 1px solid #2a2a2a; border-radius: 20px;
      width: 100%; max-width: 360px; overflow: hidden;
      transform: scale(0.92); opacity: 0;
      transition: transform 300ms cubic-bezier(0.34, 1.4, 0.64, 1), opacity 300ms ease;
      position: relative;
    }
    #popup-overlay.open #popup-card { transform: scale(1); opacity: 1; }

    @media (prefers-reduced-motion: reduce) {
      #popup-overlay, #popup-card { transition: none !important; }
    }

    #popup-progress-track { height: 3px; background: #222; width: 100%; }
    #popup-progress-bar   { height: 100%; width: 0%; background: #E8C547; transition: width 4000ms linear; }
    #popup-progress-bar.running { width: 100%; }

    #popup-close {
      position: absolute; top: 14px; right: 14px;
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(255,255,255,0.07); border: none;
      color: #666; font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 150ms ease, color 150ms ease;
    }
    #popup-close:hover { background: rgba(255,255,255,0.15); color: #fff; }

    #popup-body { padding: 26px 26px 22px; }
    #popup-jour {
      font-size: 30px; font-weight: 800; color: #E8C547;
      letter-spacing: 2px; text-transform: uppercase; line-height: 1;
    }
    #popup-nom     { font-size: 17px; font-weight: 600; color: #fff; margin-top: 7px; }
    #popup-dj      { font-size: 13px; color: #c9a93a; margin-top: 5px; font-style: italic; }
    #popup-desc    { font-size: 13px; color: #999; margin-top: 11px; line-height: 1.55; }
    #popup-horaire { font-size: 12px; color: #555; margin-top: 14px; letter-spacing: 0.3px; }

    #popup-reserver {
      display: block; width: 100%; margin-top: 20px;
      padding: 14px; border-radius: 12px; border: none;
      background: #E8C547; color: #111;
      font-size: 15px; font-weight: 700; text-align: center;
      cursor: pointer; text-decoration: none;
      transition: opacity 150ms ease;
    }
    #popup-reserver:active { opacity: 0.8; }
  </style>
</head>
<body>

  <div id="hero">
    <img id="logo-img" src="/logo192.png" alt="Logo TED">
    <div id="hero-texte" class="anim">
      <div id="hero-title">LE TED</div>
      <div id="hero-sub">Restaurant &amp; Club</div>
      <div id="hero-line"></div>
    </div>
  </div>

  <div id="soirees-section">
    <div id="soirees-label" class="anim">Nos soirées</div>
    <div id="soirees-list"></div>
  </div>

  <div id="cta-bar" class="anim">
    <a href="/menu.html?from=accueil" class="btn-cta btn-primary" data-dest="/menu.html?from=accueil" id="btn-consulter">Consulter la carte</a>
    <a href="/menu.html?carte=brasero&from=accueil" class="btn-cta btn-outline" data-dest="/menu.html?carte=brasero&from=accueil" id="btn-brasero">Carte Brasero</a>
  </div>

  <div id="lang-selector">
    <button id="lang-btn" onclick="toggleLangMenu()">FR</button>
    <div id="lang-menu">
      <button class="lang-opt" onclick="setLang('fr')">FR</button>
      <button class="lang-opt" onclick="setLang('en')">EN</button>
      <button class="lang-opt" onclick="setLang('es')">ES</button>
      <button class="lang-opt" onclick="setLang('it')">IT</button>
    </div>
  </div>

  <!-- Popup soirée -->
  <div id="popup-overlay" role="dialog" aria-modal="true" aria-labelledby="popup-nom">
    <div id="popup-card">
      <div id="popup-progress-track"><div id="popup-progress-bar"></div></div>
      <button id="popup-close" aria-label="Fermer">✕</button>
      <div id="popup-body">
        <div id="popup-jour"></div>
        <div id="popup-nom"></div>
        <div id="popup-dj"></div>
        <div id="popup-desc"></div>
        <div id="popup-horaire"></div>
        <a id="popup-reserver" href="/reserver.html">Réserver une table</a>
      </div>
    </div>
  </div>

<script>
  const SUPA_URL = 'https://mwpfaytccypvdrgapptk.supabase.co';
  const SUPA_KEY = 'sb_publishable_4-uVtQtXd0jLGkNAFsx4yw_ni17DzN_';
  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ── Langue ──────────────────────────────────────────────────────────────────
  const UI = {
    fr: { nos_soirees:'Nos soirées', consulter:'Consulter la carte', carte_brasero:'Carte Brasero', reserver:'Réserver une table' },
    en: { nos_soirees:'Our nights',  consulter:'View the menu',      carte_brasero:'Brasero menu',  reserver:'Book a table' },
    es: { nos_soirees:'Nuestras noches', consulter:'Ver la carta',   carte_brasero:'Carta Brasero', reserver:'Reservar una mesa' },
    it: { nos_soirees:'Le nostre serate', consulter:'Vedi il menu',  carte_brasero:'Menu Brasero',  reserver:'Prenota un tavolo' }
  };
  let lang = localStorage.getItem('ted_langue') || 'fr';

  function tUI(k) { return (UI[lang] || UI.fr)[k] || UI.fr[k] || k; }
  function tItem(item, field) {
    if (lang === 'fr') return item[field] || '';
    return item[field + '_' + lang] || item[field] || '';
  }

  function applyLangUI() {
    document.getElementById('lang-btn').textContent = lang.toUpperCase();
    document.querySelectorAll('.lang-opt').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === lang));
    document.getElementById('soirees-label').textContent = tUI('nos_soirees');
    document.getElementById('btn-consulter').textContent = tUI('consulter');
    document.getElementById('btn-brasero').textContent   = tUI('carte_brasero');
    document.getElementById('popup-reserver').textContent = tUI('reserver');
  }

  function toggleLangMenu() { document.getElementById('lang-menu').classList.toggle('open'); }

  function setLang(l) {
    lang = l;
    localStorage.setItem('ted_langue', l);
    document.getElementById('lang-menu').classList.remove('open');
    applyLangUI();
    // Re-render soirées avec la nouvelle langue
    const hit = soireesFromCache();
    if (hit) renderSoirees(hit.data, false);
  }

  document.addEventListener('click', e => {
    const sel = document.getElementById('lang-selector');
    if (sel && !sel.contains(e.target)) document.getElementById('lang-menu').classList.remove('open');
  });

  // ── Séquence d'animation ────────────────────────────────────────────────────
  const T0 = Date.now();
  function showAt(el, ms) {
    const rem = ms - (Date.now() - T0);
    setTimeout(() => { el.classList.add('visible'); }, Math.max(0, rem));
  }

  applyLangUI();
  setTimeout(() => { document.getElementById('logo-img').classList.add('visible'); }, 100);
  setTimeout(() => { document.getElementById('hero-texte').classList.add('visible'); }, 600);
  setTimeout(() => { document.getElementById('soirees-label').classList.add('visible'); }, 900);
  setTimeout(() => { document.getElementById('cta-bar').classList.add('visible'); }, 2000);

  // ── Popup ───────────────────────────────────────────────────────────────────
  const overlay     = document.getElementById('popup-overlay');
  const progressBar = document.getElementById('popup-progress-bar');
  let autoCloseTimer = null;

  function openPopup(s) {
    document.getElementById('popup-jour').textContent    = s.jour || '';
    document.getElementById('popup-nom').textContent     = tItem(s, 'nom');
    const djEl = document.getElementById('popup-dj');
    djEl.textContent  = s.dj ? `♪ ${s.dj}` : '';
    djEl.style.display = s.dj ? '' : 'none';
    const descEl = document.getElementById('popup-desc');
    const descText = tItem(s, 'description');
    descEl.textContent  = descText;
    descEl.style.display = descText ? '' : 'none';
    document.getElementById('popup-horaire').textContent = s.horaire ? `À partir de ${s.horaire}` : '';

    // Reset barre
    progressBar.style.transition = 'none';
    progressBar.style.width = '0%';
    progressBar.classList.remove('running');

    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';

    const barDelay = prefersReduced ? 0 : 320;
    setTimeout(() => {
      progressBar.style.transition = 'width 4000ms linear';
      progressBar.classList.add('running');
    }, barDelay);

    clearTimeout(autoCloseTimer);
    autoCloseTimer = setTimeout(closePopup, barDelay + 4000);
  }

  function closePopup() {
    clearTimeout(autoCloseTimer);
    if (!overlay.classList.contains('open')) return;
    if (prefersReduced) {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
      return;
    }
    const card = document.getElementById('popup-card');
    card.style.transition = 'transform 250ms ease, opacity 250ms ease';
    card.style.transform  = 'scale(0.95)';
    card.style.opacity    = '0';
    overlay.style.transition = 'opacity 250ms ease';
    overlay.style.opacity    = '0';
    setTimeout(() => {
      overlay.classList.remove('open');
      overlay.style.opacity = ''; overlay.style.transition = '';
      card.style.transform  = ''; card.style.opacity = ''; card.style.transition = '';
      document.body.style.overflow = '';
    }, 260);
  }

  overlay.addEventListener('click', e => { if (e.target === overlay) closePopup(); });
  document.getElementById('popup-close').addEventListener('click', closePopup);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePopup(); });

  // Bouton réserver — annule le timer et navigue
  document.getElementById('popup-reserver').addEventListener('click', () => {
    clearTimeout(autoCloseTimer);
  });

  // ── Cache sessionStorage soirées (TTL 5 min) ───────────────────────────────
  const SOIREES_KEY   = 'ted_soirees_v2';
  const SOIREES_TTL   = 5 * 60 * 1000;
  const SOIREES_STALE =     60 * 1000;

  function soireesFromCache() {
    try {
      const raw = sessionStorage.getItem(SOIREES_KEY);
      if (!raw) return null;
      const { ts, data } = JSON.parse(raw);
      if (Date.now() - ts > SOIREES_TTL) { sessionStorage.removeItem(SOIREES_KEY); return null; }
      return { data, age: Date.now() - ts };
    } catch(e) { return null; }
  }

  function soiresToCache(data) {
    try { sessionStorage.setItem(SOIREES_KEY, JSON.stringify({ ts: Date.now(), data })); } catch(e) {}
  }

  function renderSoirees(soirees, animate) {
    const list = document.getElementById('soirees-list');
    if (!Array.isArray(soirees) || !soirees.length) {
      document.getElementById('soirees-section').style.display = 'none';
      return;
    }
    list.innerHTML = '';
    soirees.forEach((s, i) => {
      const el = document.createElement('div');
      el.className = animate ? 'soiree-item anim' : 'soiree-item anim visible';
      el.setAttribute('role', 'button');
      el.setAttribute('tabindex', '0');
      const sNom = tItem(s, 'nom');
      const when = [s.jour, s.horaire].filter(Boolean).map(esc).join(' · ');
      el.innerHTML = `
        <div class="soiree-info">
          <div class="soiree-nom">${esc(sNom)}</div>
          ${when ? `<div class="soiree-when">${when}</div>` : ''}
        </div>
        <div class="soiree-chevron">›</div>
      `;
      el.addEventListener('click', () => openPopup(s));
      el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openPopup(s); });
      list.appendChild(el);
      if (animate) showAt(el, 1100 + i * 150);
    });
  }

  async function fetchSoirees(silent) {
    const r = await fetch(
      `${SUPA_URL}/rest/v1/menu_soirees?select=id,nom,nom_en,nom_es,nom_it,description,description_en,description_es,description_it,jour,horaire,dj&visible=eq.true&order=ordre.asc`,
      { headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` } }
    );
    if (!r.ok) return;
    const soirees = await r.json();
    soiresToCache(soirees);
    renderSoirees(soirees, !silent);
  }

  // ── Chargement Supabase ─────────────────────────────────────────────────────
  (function loadSoirees() {
    const hit = soireesFromCache();
    if (hit) {
      // Affichage immédiat depuis le cache — pas d'animation (déjà visible)
      renderSoirees(hit.data, false);
      // Revalidation silencieuse si le cache a > 60s
      if (hit.age > SOIREES_STALE) {
        fetchSoirees(true).catch(() => {});
      }
      return;
    }
    // Pas de cache — fetch avec animations séquentielles
    fetchSoirees(false).catch(() => {});
  })();

  // ── bfcache : retour navigateur — soirées déjà dans le DOM ─────────────────
  window.addEventListener('pageshow', e => {
    if (e.persisted && document.getElementById('soirees-list').children.length === 0) {
      const hit = soireesFromCache();
      if (hit) renderSoirees(hit.data, false);
      else fetchSoirees(false).catch(() => {});
    }
  });

  // ── Transition de sortie ────────────────────────────────────────────────────
  document.querySelectorAll('.btn-cta[data-dest]').forEach(btn => {
    btn.addEventListener('click', e => {
      const dest = btn.dataset.dest;
      if (prefersReduced) { window.location.href = dest; return; }
      e.preventDefault();
      document.body.style.transition = 'opacity 300ms ease, transform 300ms ease';
      document.body.style.opacity = '0';
      document.body.style.transform = 'translateY(-10px)';
      setTimeout(() => { window.location.href = dest; }, 300);
    });
  });

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
