  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  0%   { transform: rotateY(0deg); opacity:0; }\n      5%   { opacity:1; }\n      50%  { transform: rotateY(1440deg); }\n      80%  { transform: rotateY(1800deg); }\n      100% { transform: rotateY(2160deg); }\n    }\n    @keyframes logoShrink {\n      0%,60% { transform: scale(2.8) translateY(60px); }\n      90%    { transform: scale(1.02) translateY(0); }\n      100%   { transform: scale(1) translateY(0); }\n    }\n    @keyframes contentReveal {\n      0%,70% { opacity:0; transform:translateY(12px); }\n      100%   { opacity:1; transform:translateY(0); }\n    }\n    @keyframes confettiFall { 0%{transform:translateY(-10px) rotate(0deg) scale(1);opacity:1} 100%{transform:translateY(90vh) rotate(540deg) scale(.5);opacity:0} }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<!-- Dark background -->\n<div id=\"mainBg\" style=\"position:fixed;inset:0;background:radial-gradient(ellipse at 40% 20%, #1c1c2e 0%, #000 60%);display:flex;align-items:center;justify-content:center;padding:24px;transition:filter .15s;\">\n\n  <div id=\"particleLayer\" style=\"position:fixed;inset:0;pointer-events:none;overflow:hidden;\"><\u002Fdiv>\n\n  <!-- Popup -->\n  <div style=\"width:100%;max-width:390px;border-radius:22px;position:relative;max-height:92vh;overflow-y:auto;background:linear-gradient(180deg, #fff8c0 0%, #FFE033 25%, #FFC200 60%, #FF9500 100%);box-shadow:0 32px 80px rgba(0,0,0,0.6),0 0 0 0.5px rgba(255,200,0,0.3);animation:fadeUp .3s cubic-bezier(.25,.46,.45,.94)\">\n\n    <!-- Close -->\n    <!-- Close with countdown -->\n    <div style=\"position:absolute;top:12px;right:14px;width:34px;height:34px;\">\n      <sc-if value=\"{{ !canClose }}\" hint-placeholder-val=\"{{ true }}\">\n        <svg width=\"34\" height=\"34\" style=\"position:absolute;inset:0;transform:rotate(-90deg);pointer-events:none;\">\n          <circle cx=\"17\" cy=\"17\" r=\"16\" fill=\"none\" stroke=\"rgba(0,0,0,0.1)\" stroke-width=\"2\"><\u002Fcircle>\n          <circle cx=\"17\" cy=\"17\" r=\"16\" fill=\"none\" stroke=\"rgba(0,0,0,0.5)\" stroke-width=\"2.5\" stroke-dasharray=\"100.5\" stroke-dashoffset=\"0\" style=\"animation:closeCountdown 5s linear forwards;\"><\u002Fcircle>\n        <\u002Fsvg>\n      <\u002Fsc-if>\n      <button onclick=\"{{ close }}\" style=\"position:absolute;inset:0;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.3);border:1px solid rgba(255,255,255,0.7);cursor:{{ canClose ? 'pointer' : 'not-allowed' }};font-size:13px;display:flex;align-items:center;justify-content:center;color:{{ canClose ? 'rgba(0,0,0,0.6)' : 'rgba(0,0,0,0.2)' }};font-family:inherit;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:inset 0 1px 0 rgba(255,255,255,0.9),0 2px 8px rgba(0,0,0,0.1);transition:color .3s;\">✕<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- Title -->\n    <div style=\"text-align:center;padding:20px 24px 4px;display:flex;flex-direction:column;align-items:center;\">\n      <!-- TED logo extrudé 3D -->\n      <div style=\"perspective:600px;margin-bottom:10px;display:flex;justify-content:center;animation:logoShrink 3s cubic-bezier(.1,0,.2,1) forwards;\">\n        <div style=\"position:relative;width:100px;height:100px;transform-style:preserve-3d;transform-origin:50% 50% 0;animation:logoSpin 3s cubic-bezier(.1,0,.2,1) forwards, logoPulse 3s 3s ease-in-out infinite;\">\n          <!-- Extrusion layers — depth effect -->\n          <img src=\"92bfd052-a57a-4e25-9d19-692b9aa26a30\" style=\"position:absolute;inset:0;width:100px;height:100px;object-fit:contain;object-position:center;image-rendering:high-quality;filter:brightness(0) sepia(1) saturate(3) hue-rotate(-10deg) brightness(0.35);transform:translateZ(-2px);transform-origin:50% 50%;\" alt=\"\">\n          <img src=\"92bfd052-a57a-4e25-9d19-692b9aa26a30\" style=\"position:absolute;inset:0;width:100px;height:100px;object-fit:contain;object-position:center;image-rendering:high-quality;filter:brightness(0) sepia(1) saturate(3) hue-rotate(-10deg) brightness(0.3);transform:translateZ(-4px);transform-origin:50% 50%;\" alt=\"\">\n          <img src=\"92bfd052-a57a-4e25-9d19-692b9aa26a30\" style=\"position:absolute;inset:0;width:100px;height:100px;object-fit:contain;object-position:center;image-rendering:high-quality;filter:brightness(0) sepia(1) saturate(3) hue-rotate(-10deg) brightness(0.25);transform:translateZ(-6px);transform-origin:50% 50%;\" alt=\"\">\n          <img src=\"92bfd052-a57a-4e25-9d19-692b9aa26a30\" style=\"position:absolute;inset:0;width:100px;height:100px;object-fit:contain;object-position:center;image-rendering:high-quality;filter:brightness(0) sepia(1) saturate(3) hue-rotate(-10deg) brightness(0.2);transform:translateZ(-9px);transform-origin:50% 50%;\" alt=\"\">\n          <img src=\"92bfd052-a57a-4e25-9d19-692b9aa26a30\" style=\"position:absolute;inset:0;width:100px;height:100px;object-fit:contain;object-position:center;image-rendering:high-quality;filter:brightness(0) sepia(1) saturate(3) hue-rotate(-10deg) brightness(0.15);transform:translateZ(-12px);transform-origin:50% 50%;\" alt=\"\">\n          <img src=\"92bfd052-a57a-4e25-9d19-692b9aa26a30\" style=\"position:absolute;inset:0;width:100px;height:100px;object-fit:contain;object-position:center;image-rendering:high-quality;filter:brightness(0) sepia(1) saturate(3) hue-rotate(-10deg) brightness(0.1);transform:translateZ(-16px);transform-origin:50% 50%;\" alt=\"\">\n          <!-- Front face — bright -->\n          <img src=\"92bfd052-a57a-4e25-9d19-692b9aa26a30\" style=\"position:absolute;inset:0;width:100px;height:100px;object-fit:contain;object-position:center;image-rendering:high-quality;filter:brightness(0);transform:translateZ(0px);transform-origin:50% 50%;\" alt=\"Le TED\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <h1 style=\"font-size:26px;color:#1a1200;animation:subtleFloat 4s 3.5s ease infinite,contentReveal 3.5s cubic-bezier(.25,.46,.45,.94) forwards;\"><span style=\"font-family:'Caveat',cursive;font-weight:700;font-size:30px;\">Grand Jeux du <\u002Fspan><span style=\"font-family:-apple-system,'Inter',sans-serif;font-weight:800;letter-spacing:-.3px;\">TED<\u002Fspan><\u002Fh1>\n      <p style=\"font-size:13px;color:rgba(0,0,0,0.5);margin-top:4px;font-weight:400;animation:contentReveal 3.5s cubic-bezier(.25,.46,.45,.94) forwards;\">Tentez votre chance<\u002Fp>\n\n    <\u002Fdiv>\n\n\n\n    <!-- Wheel -->\n    <div style=\"display:flex;flex-direction:column;align-items:center;padding:4px 24px 20px;background:transparent;position:relative;animation:contentReveal 1s 2.8s cubic-bezier(.25,.46,.45,.94) both;\">\n      <div style=\"position:relative;width:280px;height:298px;\">\n        <!-- Pointer — liquid glass -->\n        <div style=\"position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:10;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.2));\">\n          <svg width=\"22\" height=\"28\" viewBox=\"0 0 22 28\">\n            <defs>\n              <linearGradient id=\"pg\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                <stop offset=\"0%\" stop-color=\"rgba(255,255,255,0.95)\"><\u002Fstop>\n                <stop offset=\"50%\" stop-color=\"rgba(255,255,255,0.5)\"><\u002Fstop>\n                <stop offset=\"100%\" stop-color=\"rgba(255,255,255,0.2)\"><\u002Fstop>\n              <\u002FlinearGradient>\n            <\u002Fdefs>\n            <polygon points=\"11,28 22,0 0,0\" fill=\"url(#pg)\"><\u002Fpolygon>\n            <polygon points=\"11,24 19,2 3,2\" fill=\"rgba(255,255,255,0.3)\"><\u002Fpolygon>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <canvas id=\"wheelCanvas\" width=\"280\" height=\"280\" style=\"position:absolute;top:18px;left:0;border-radius:50%;filter:drop-shadow(0 0 40px rgba(255,215,0,0.9)) drop-shadow(0 0 80px rgba(255,160,0,0.6)) drop-shadow(0 0 120px rgba(255,120,0,0.3));\"><\u002Fcanvas>\n      <\u002Fdiv>\n\n      <!-- Spin button -->\n      <button onclick=\"{{ spin }}\" style=\"margin-top:64px;width:100%;max-width:260px;padding:15px 24px;border-radius:20px;border:1px solid rgba(255,255,255,0.6);background:rgba(255,255,255,0.25);color:#1a1200;font-family:-apple-system,'Inter',sans-serif;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:-.2px;transition:all .2s;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 4px 24px rgba(255,255,255,0.3),inset 0 1px 0 rgba(255,255,255,0.8),inset 0 -1px 0 rgba(0,0,0,0.08);text-shadow:0 1px 2px rgba(255,255,255,0.5);\">\n        {{ btnLabel }}\n      <\u002Fbutton>\n\n      <!-- Essais restants -->\n      <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;margin-top:20px;width:260px;text-align:center;margin-left:auto;margin-right:auto;\">\n        <div style=\"font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(0,0,0,0.4);\">Essais<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:8px;\">\n          <div style=\"font-size:14px;font-weight:700;color:#1a1200;text-align:center;\">{{ triesUsed }}<span style=\"color:rgba(0,0,0,0.35);font-weight:500;\">/3<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:8px;justify-content:center;\">\n            <sc-for list=\"{{ tries }}\" as=\"try\" hint-placeholder-count=\"3\">\n              <div style=\"width:12px;height:12px;border-radius:50%;background:{{ try.active ? 'rgba(0,0,0,0.15)' : '#1a1200' }};transition:all .3s;\"><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Result -->\n    <sc-if value=\"{{ showResult }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;padding:32px;\">\n        <div style=\"position:absolute;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);\"><\u002Fdiv>\n        <div style=\"position:relative;width:100%;max-width:320px;background:linear-gradient(160deg,#fff8c0,#FFE033 40%,#FFC200);border-radius:24px;padding:36px 28px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,0.45),0 0 0 1px rgba(255,255,255,0.3);animation:winReveal .5s cubic-bezier(.34,1.56,.64,1);\">\n          <div style=\"font-size:56px;margin-bottom:14px;\">{{ resultEmoji }}<\u002Fdiv>\n          <div style=\"font-size:26px;font-weight:900;color:#1a1200;margin-bottom:4px;\">🎉 Félicitations !<\u002Fdiv>\n          <div style=\"font-size:15px;font-weight:500;color:rgba(0,0,0,0.5);margin-bottom:12px;\">Vous avez gagné<\u002Fdiv>\n          <div style=\"font-size:20px;font-weight:800;color:#1a1200;letter-spacing:-.3px;margin-bottom:24px;padding:22px 24px;background:rgba(0,0,0,0.1);border-radius:20px;border:2px solid rgba(0,0,0,0.12);width:100%;\">{{ resultLabel }}<\u002Fdiv>\n          <button onclick=\"{{ claim }}\" style=\"width:100%;padding:16px;border-radius:14px;border:none;background:#1a1200;color:#fff;font-family:-apple-system,'Inter',sans-serif;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:-.2px;box-shadow:0 4px 16px rgba(0,0,0,0.3);margin-top:48px;\">\n            Récupérer ma récompense\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Bottom safe area -->\n    <div style=\"height:env(safe-area-inset-bottom,0px);\"><\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Form overlay (outside popup) -->\n<sc-if value=\"{{ showForm }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;inset:0;background:linear-gradient(180deg,#fff8c0 0%,#FFE033 30%,#FFC200 70%,#FF9500 100%);z-index:200;overflow-y:auto;padding:0 0 40px;animation:fadeUp .35s cubic-bezier(.25,.46,.45,.94);\">\n\n    <sc-if value=\"{{ formSubmitted }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px;text-align:center;\">\n        <div style=\"font-size:64px;margin-bottom:20px;\">🎁<\u002Fdiv>\n        <h2 style=\"font-size:26px;font-weight:900;color:#1a1200;margin-bottom:10px;\">C'est tout bon !<\u002Fh2>\n        <p style=\"font-size:15px;color:rgba(0,0,0,0.6);max-width:280px;line-height:1.6;margin-bottom:32px;\">Votre récompense vous a été envoyée.<br>À bientôt au TED !<\u002Fp>\n        <button onclick=\"{{ goHome }}\" style=\"padding:16px 36px;border-radius:14px;border:none;background:#1a1200;color:#fff;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.25);\">\n          Retour à l'accueil\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ !formSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n      <!-- Header -->\n      <div style=\"padding:56px 24px 20px;text-align:center;\">\n        <img src=\"92bfd052-a57a-4e25-9d19-692b9aa26a30\" alt=\"Le TED\" style=\"width:52px;height:52px;object-fit:contain;filter:brightness(0);margin-bottom:12px;\">\n        <h2 style=\"font-size:22px;font-weight:900;color:#1a1200;margin-bottom:6px;\">Récupérez votre récompense<\u002Fh2>\n        <p style=\"font-size:13px;color:rgba(0,0,0,0.5);line-height:1.8;\">Renseignez vos bonnes informations pour recevoir votre récompense.<\u002Fp>\n        <p style=\"font-size:13px;font-weight:700;color:rgba(0,0,0,0.65);margin-top:4px;\">Sinon elle sera perdue.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- Form -->\n      <div style=\"padding:0 20px;display:flex;flex-direction:column;gap:14px;\">\n\n        <!-- Genre -->\n        <div>\n          <div style=\"font-size:12px;font-weight:600;color:rgba(0,0,0,0.5);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;\">Genre<\u002Fdiv>\n          <div style=\"display:flex;gap:10px;\">\n            <button onclick=\"{{ selectM }}\" style=\"flex:1;padding:14px;border-radius:12px;border:2px solid {{ genderM ? '#1a1200' : 'rgba(0,0,0,0.15)' }};background:{{ genderM ? '#1a1200' : 'rgba(255,255,255,0.6)' }};color:{{ genderM ? '#FFD700' : '#1a1200' }};font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;\">M.<\u002Fbutton>\n            <button onclick=\"{{ selectMme }}\" style=\"flex:1;padding:14px;border-radius:12px;border:2px solid {{ genderMme ? '#1a1200' : 'rgba(0,0,0,0.15)' }};background:{{ genderMme ? '#1a1200' : 'rgba(255,255,255,0.6)' }};color:{{ genderMme ? '#FFD700' : '#1a1200' }};font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;\">Mme<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Nom -->\n        <div>\n          <div style=\"font-size:12px;font-weight:600;color:rgba(0,0,0,0.5);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;\">Nom<\u002Fdiv>\n          <input type=\"text\" placeholder=\"Votre nom\" style=\"width:100%;padding:15px 16px;border-radius:12px;border:1.5px solid rgba(0,0,0,0.12);background:rgba(255,255,255,0.7);font-size:15px;font-family:inherit;color:#1a1200;outline:none;\">\n        <\u002Fdiv>\n\n        <!-- Prénom -->\n        <div>\n          <div style=\"font-size:12px;font-weight:600;color:rgba(0,0,0,0.5);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;\">Prénom<\u002Fdiv>\n          <input type=\"text\" placeholder=\"Votre prénom\" style=\"width:100%;padding:15px 16px;border-radius:12px;border:1.5px solid rgba(0,0,0,0.12);background:rgba(255,255,255,0.7);font-size:15px;font-family:inherit;color:#1a1200;outline:none;\">\n        <\u002Fdiv>\n\n        <!-- Téléphone -->\n        <div>\n          <div style=\"font-size:12px;font-weight:600;color:rgba(0,0,0,0.5);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;\">Numéro de téléphone<\u002Fdiv>\n          <input type=\"tel\" placeholder=\"06 00 00 00 00\" style=\"width:100%;padding:15px 16px;border-radius:12px;border:1.5px solid rgba(0,0,0,0.12);background:rgba(255,255,255,0.7);font-size:15px;font-family:inherit;color:#1a1200;outline:none;\">\n        <\u002Fdiv>\n\n        <!-- Email -->\n        <div>\n          <div style=\"font-size:12px;font-weight:600;color:rgba(0,0,0,0.5);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;\">Email<\u002Fdiv>\n          <input type=\"email\" placeholder=\"votre@email.com\" style=\"width:100%;padding:15px 16px;border-radius:12px;border:1.5px solid rgba(0,0,0,0.12);background:rgba(255,255,255,0.7);font-size:15px;font-family:inherit;color:#1a1200;outline:none;\">\n        <\u002Fdiv>\n\n        <!-- Consentement -->\n        <label style=\"display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:rgba(255,255,255,0.5);border-radius:12px;cursor:pointer;border:1.5px solid rgba(0,0,0,0.1);\">\n          <input type=\"checkbox\" checked=\"true\" style=\"width:18px;height:18px;margin-top:2px;accent-color:#1a1200;flex-shrink:0;\">\n          <span style=\"font-size:11px;color:rgba(0,0,0,0.55);line-height:1.5;\">J'accepte que mes données soient utilisées par l'établissement pour m'envoyer ma récompense. Ces données ne seront pas transmises à des tiers. <strong>*<\u002Fstrong><\u002Fspan>\n        <\u002Flabel>\n\n        <!-- Submit -->\n        <button onclick=\"{{ submitForm }}\" style=\"width:100%;padding:17px;border-radius:14px;border:none;background:#1a1200;color:#fff;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;margin-top:6px;box-shadow:0 4px 20px rgba(0,0,0,0.25);\">\n          Valider mes informations\n        <\u002Fbutton>\n\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    spinning: false,\n    showResult: false,\n    showForm: false,\n    canClose: false,\n    resultLabel: '',\n    resultEmoji: '',\n    btnLabel: 'Tourner la roue',\n    btnBg: '#1a1200',\n    btnColor: '#ffffff',\n    btnShadow: '0 4px 20px rgba(0,0,0,0.3)',\n    currentAngle: 0,\n    gender: 'M.',\n    formSubmitted: false,\n    triesLeft: 3,\n  };\n\n  segments = [\n    { label: 'Magnum de rosé',          emoji: '🍾', win: true  },\n    { label: 'Perdu',                   emoji: '🫤', win: false },\n    { label: 'Bouteille de champagne',  emoji: '🍾', win: true  },\n    { label: 'Perdu',                   emoji: '🫤', win: false },\n    { label: 'Magnum de rosé',          emoji: '🍾', win: true  },\n    { label: 'Perdu',                   emoji: '🫤', win: false },\n    { label: 'Bouteille de champagne',  emoji: '🍾', win: true  },\n    { label: 'Perdu',                   emoji: '🫤', win: false },\n    { label: 'Magnum de rosé',          emoji: '🍾', win: true  },\n    { label: 'Perdu',                   emoji: '🫤', win: false },\n  ];\n\n  bulbTick = 0;\n  idleRaf = null;\n\n  componentDidMount() {\n    requestAnimationFrame(() => { this.drawWheel(0); this.idleLoop(); });\n    setTimeout(() => this.setState({ canClose: true }), 5000);\n  }\n\n  idleLoop() {\n    this.bulbTick++;\n    if (!this.state.spinning) this.drawWheel(this.state.currentAngle);\n    setTimeout(() => requestAnimationFrame(() => this.idleLoop()), 160);\n  }\n\n  drawWheel(rotation) {\n    const canvas = document.getElementById('wheelCanvas');\n    if (!canvas) return;\n    const ctx = canvas.getContext('2d');\n    const dpr = window.devicePixelRatio || 1;\n    const displaySize = 280;\n    // Set canvas resolution to match device pixel ratio\n    if (canvas.width !== displaySize * dpr) {\n      canvas.width = displaySize * dpr;\n      canvas.height = displaySize * dpr;\n      canvas.style.width = displaySize + 'px';\n      canvas.style.height = displaySize + 'px';\n    }\n    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n    const S = displaySize, cx = S/2, cy = S/2;\n    const outerR = S/2 - 1;\n    const rimW = 16;\n    const innerR = outerR - rimW;\n    const n = this.segments.length;\n    const arc = (2 * Math.PI) / n;\n\n    ctx.clearRect(0, 0, S, S);\n\n    // Outer glow — neon light effect\n    ctx.save();\n    ctx.shadowColor = '#FFD700';\n    ctx.shadowBlur = 30;\n    ctx.beginPath();\n    ctx.arc(cx, cy, outerR, 0, 2*Math.PI);\n    ctx.strokeStyle = 'rgba(255,215,0,0.6)';\n    ctx.lineWidth = 4;\n    ctx.stroke();\n    ctx.restore();\n\n    // Drop shadow under wheel\n    ctx.save();\n    ctx.shadowColor = 'rgba(0,0,0,0.55)';\n    ctx.shadowBlur = 24;\n    ctx.shadowOffsetY = 8;\n    ctx.beginPath();\n    ctx.arc(cx, cy, outerR, 0, 2*Math.PI);\n    ctx.fillStyle = '#000';\n    ctx.fill();\n    ctx.restore();\n\n    // Outer rim — 3D bevel with multiple rings\n    // Bottom shadow arc\n    const rimShadow = ctx.createLinearGradient(cx - outerR, cy - outerR, cx + outerR, cy + outerR);\n    rimShadow.addColorStop(0, '#555560');\n    rimShadow.addColorStop(0.35, '#222228');\n    rimShadow.addColorStop(0.65, '#111116');\n    rimShadow.addColorStop(1, '#33333a');\n    ctx.beginPath();\n    ctx.arc(cx, cy, outerR, 0, 2*Math.PI);\n    ctx.fillStyle = rimShadow;\n    ctx.fill();\n\n    // Rim highlight top-left bevel\n    const rimHL = ctx.createLinearGradient(cx - outerR, cy - outerR, cx + outerR * 0.3, cy + outerR * 0.3);\n    rimHL.addColorStop(0, 'rgba(255,255,255,0.18)');\n    rimHL.addColorStop(0.4, 'rgba(255,255,255,0.04)');\n    rimHL.addColorStop(1, 'rgba(0,0,0,0.1)');\n    ctx.beginPath();\n    ctx.arc(cx, cy, outerR, 0, 2*Math.PI);\n    ctx.fillStyle = rimHL;\n    ctx.fill();\n\n    // Inner rim edge (raised lip)\n    ctx.beginPath();\n    ctx.arc(cx, cy, outerR - rimW + 2, 0, 2*Math.PI);\n    ctx.strokeStyle = 'rgba(255,255,255,0.12)';\n    ctx.lineWidth = 2;\n    ctx.stroke();\n    ctx.beginPath();\n    ctx.arc(cx, cy, outerR - rimW + 2, 0, 2*Math.PI);\n    ctx.strokeStyle = 'rgba(0,0,0,0.35)';\n    ctx.lineWidth = 1;\n    ctx.stroke();\n\n    // Segments — 3D shading with gradients\n    for (let i = 0; i < n; i++) {\n      const startAngle = rotation + i * arc - Math.PI/2;\n      const endAngle = startAngle + arc;\n      const midAngle = startAngle + arc / 2;\n      const seg = this.segments[i];\n      const ci = i % 2;\n\n      // Per-segment radial gradient for depth\n      const gx1 = cx + (innerR * 0.2) * Math.cos(midAngle);\n      const gy1 = cy + (innerR * 0.2) * Math.sin(midAngle);\n      const gx2 = cx + innerR * Math.cos(midAngle);\n      const gy2 = cy + innerR * Math.sin(midAngle);\n      const segGrad = ctx.createLinearGradient(gx1, gy1, gx2, gy2);\n      if (ci === 0) {\n        segGrad.addColorStop(0, '#FFFACC');\n        segGrad.addColorStop(0.45, '#FFD700');\n        segGrad.addColorStop(1, '#B87800');\n      } else {\n        segGrad.addColorStop(0, '#2c2c36');\n        segGrad.addColorStop(0.45, '#111116');\n        segGrad.addColorStop(1, '#000');\n      }\n\n      ctx.beginPath();\n      ctx.moveTo(cx, cy);\n      ctx.arc(cx, cy, innerR, startAngle, endAngle);\n      ctx.closePath();\n      ctx.fillStyle = segGrad;\n      ctx.fill();\n\n      // Dividers\n      ctx.strokeStyle = 'rgba(0,0,0,0.4)';\n      ctx.lineWidth = 1.5;\n      ctx.stroke();\n\n      // Highlight gloss overlay\n      const glossGrad = ctx.createRadialGradient(cx, cy - innerR * 0.1, 0, cx, cy, innerR);\n      glossGrad.addColorStop(0, 'rgba(255,255,255,0.22)');\n      glossGrad.addColorStop(0.4, 'rgba(255,255,255,0.06)');\n      glossGrad.addColorStop(1, 'rgba(0,0,0,0.15)');\n      ctx.beginPath();\n      ctx.moveTo(cx, cy);\n      ctx.arc(cx, cy, innerR, startAngle, endAngle);\n      ctx.closePath();\n      ctx.fillStyle = glossGrad;\n      ctx.fill();\n\n      // Text\n      ctx.save();\n      ctx.translate(cx, cy);\n      ctx.rotate(midAngle);\n      ctx.textAlign = 'right';\n      ctx.font = `800 11px -apple-system, Inter, sans-serif`;\n      ctx.fillStyle = ci === 0 ? '#3a2000' : 'rgba(255,255,255,0.9)';\n      ctx.shadowColor = ci === 0 ? 'rgba(255,240,100,0.5)' : 'rgba(0,0,0,0.7)';\n      ctx.shadowBlur = 4;\n      ctx.fillText(seg.win ? 'GAGNÉ' : 'PERDU', innerR - 10, 4);\n      ctx.shadowBlur = 0;\n      ctx.restore();\n    }\n\n    // Edge vignette for depth\n    const vignette = ctx.createRadialGradient(cx, cy, innerR * 0.7, cx, cy, innerR);\n    vignette.addColorStop(0, 'rgba(0,0,0,0)');\n    vignette.addColorStop(1, 'rgba(0,0,0,0.2)');\n    ctx.beginPath();\n    ctx.arc(cx, cy, innerR, 0, 2*Math.PI);\n    ctx.fillStyle = vignette;\n    ctx.fill();\n\n    // Bulbs — sequential soft glow\n    const bulbCount = 20;\n    const now = Date.now();\n    for (let i = 0; i < bulbCount; i++) {\n      const a = (i / bulbCount) * 2 * Math.PI - Math.PI/2;\n      const bx = cx + (outerR - 8) * Math.cos(a);\n      const by = cy + (outerR - 8) * Math.sin(a);\n      // Each bulb has a phase offset, creating a chasing wave\n      const phase = (now / 600 - i / bulbCount * bulbCount) % bulbCount;\n      const brightness = 0.3 + 0.7 * Math.pow(Math.max(0, Math.cos((phase / bulbCount) * 2 * Math.PI)), 2);\n      ctx.beginPath();\n      ctx.arc(bx, by, 4.5, 0, 2*Math.PI);\n      ctx.fillStyle = `rgba(255,240,100,${brightness.toFixed(2)})`;\n      ctx.shadowColor = '#FFD700';\n      ctx.shadowBlur = brightness > 0.6 ? 16 : 4;\n      ctx.fill();\n      ctx.shadowBlur = 0;\n    }\n\n    // Center hub — chrome 3D look\n    // Shadow under hub\n    ctx.save();\n    ctx.shadowColor = 'rgba(0,0,0,0.6)';\n    ctx.shadowBlur = 10;\n    ctx.shadowOffsetY = 3;\n    ctx.beginPath();\n    ctx.arc(cx, cy, 18, 0, 2*Math.PI);\n    ctx.fillStyle = '#111';\n    ctx.fill();\n    ctx.restore();\n\n    // Hub body gradient\n    const hub = ctx.createRadialGradient(cx - 5, cy - 6, 1, cx, cy, 18);\n    hub.addColorStop(0, '#ffffff');\n    hub.addColorStop(0.25, '#e0e0e8');\n    hub.addColorStop(0.6, '#888898');\n    hub.addColorStop(1, '#333340');\n    ctx.beginPath();\n    ctx.arc(cx, cy, 18, 0, 2*Math.PI);\n    ctx.fillStyle = hub;\n    ctx.fill();\n\n    // Hub rim\n    ctx.beginPath();\n    ctx.arc(cx, cy, 18, 0, 2*Math.PI);\n    ctx.strokeStyle = 'rgba(255,255,255,0.5)';\n    ctx.lineWidth = 1.5;\n    ctx.stroke();\n\n    // Hub center dot\n    const dot = ctx.createRadialGradient(cx - 2, cy - 2, 0, cx, cy, 6);\n    dot.addColorStop(0, '#fff');\n    dot.addColorStop(1, '#aaa');\n    ctx.beginPath();\n    ctx.arc(cx, cy, 6, 0, 2*Math.PI);\n    ctx.fillStyle = dot;\n    ctx.fill();\n  }\n\n  spawnConfetti() {\n    const layer = document.getElementById('particleLayer');\n    if (!layer) return;\n    const colors = ['#FFD700', '#FF8C00', '#fff', '#FFE033', '#FFF3A0', '#FFA500'];\n    for (let i = 0; i < 50; i++) {\n      const el = document.createElement('div');\n      const x = Math.random() * 100;\n      const delay = Math.random() * 0.8;\n      const dur = 1.6 + Math.random() * 1.4;\n      const sz = 5 + Math.random() * 8;\n      el.style.cssText = `position:absolute;left:${x}%;top:-10px;width:${sz}px;height:${sz}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation:confettiFall ${dur}s ${delay}s ease-in forwards;`;\n      layer.appendChild(el);\n      setTimeout(() => el.remove(), (dur + delay + 0.2) * 1000);\n    }\n    // Flash background\n    const bg = document.getElementById('mainBg');\n    if (bg) {\n      let t = 0;\n      const iv = setInterval(() => {\n        bg.style.filter = t++ % 2 === 0 ? 'brightness(1.3) saturate(1.2)' : 'brightness(0.95)';\n        if (t > 8) { clearInterval(iv); bg.style.filter = ''; }\n      }, 100);\n    }\n  }\n\n  spin() {\n    if (this.state.spinning || this.state.triesLeft <= 0) return;\n    const n = this.segments.length;\n    const winIndex = Math.floor(Math.random() * n);\n    const arc = (2 * Math.PI) / n;\n    const extraSpins = (7 + Math.floor(Math.random() * 3)) * 2 * Math.PI;\n    const norm = this.state.currentAngle % (2 * Math.PI);\n    const targetOffset = (2 * Math.PI - winIndex * arc - arc/2 - norm + 2 * Math.PI) % (2 * Math.PI);\n    const targetAngle = this.state.currentAngle + extraSpins + targetOffset;\n\n    const newTries = this.state.triesLeft - 1;\n    this.setState({ spinning: true, showResult: false, triesLeft: newTries, btnLabel: 'En cours…', btnBg: 'rgba(255,255,255,0.1)', btnColor: 'rgba(255,255,255,0.4)', btnShadow: 'none' });\n\n    const duration = 7500;\n    const start = performance.now();\n    const startAngle = this.state.currentAngle;\n\n    const easeOutQuint = t => {\n      // Smooth deceleration: fast start, very gradual stop\n      return 1 - Math.pow(1 - t, 6);\n    };\n\n    const animate = (now) => {\n      const t = Math.min((now - start) / duration, 1);\n      const eased = easeOutQuint(t);\n      this.drawWheel(startAngle + (targetAngle - startAngle) * eased);\n      if (t < 1) { requestAnimationFrame(animate); return; }\n\n      const seg = this.segments[winIndex];\n      if (seg.win) this.spawnConfetti();\n      this.setState({\n        spinning: false,\n        showResult: seg.win,\n        resultLabel: seg.label,\n        resultEmoji: seg.emoji,\n        currentAngle: targetAngle,\n        btnLabel: seg.win ? 'Rejouer' : 'Retenter sa chance',\n        btnBg: '#1a1200',\n        btnColor: '#ffffff',\n        btnShadow: '0 4px 20px rgba(0,0,0,0.3)',\n      });\n    };\n    requestAnimationFrame(animate);\n  }\n\n  close() { if (!this.state.canClose) return; }\n  claim() { this.setState({ showResult: false, showForm: true }); }\n  selectGender(g) { this.setState({ gender: g }); }\n  submitForm() { this.setState({ formSubmitted: true }); }\n  goHome() { this.setState({ showForm: false, formSubmitted: false, showResult: false, spinning: false, btnLabel: 'Tourner la roue', btnBg: '#1a1200', btnColor: '#ffffff', btnShadow: '0 4px 20px rgba(0,0,0,0.3)' }); }\n\n  renderVals() {\n    return {\n      spin: () => this.spin(),\n      close: () => this.close(),\n      claim: () => this.claim(),\n      showForm: this.state.showForm,\n      formSubmitted: this.state.formSubmitted,\n      gender: this.state.gender,\n      selectM: () => this.selectGender('M.'),\n      selectMme: () => this.selectGender('Mme'),\n      submitForm: () => this.submitForm(),\n      goHome: () => this.goHome(),\n      canClose: this.state.canClose,\n      triesLeft: this.state.triesLeft,\n      triesUsed: 3 - this.state.triesLeft,\n      tries: [\n        { active: this.state.triesLeft >= 3 },\n        { active: this.state.triesLeft >= 2 },\n        { active: this.state.triesLeft >= 1 },\n      ],\n      genderM: this.state.gender === 'M.',\n      genderMme: this.state.gender === 'Mme',\n      showResult: this.state.showResult,\n      resultLabel: this.state.resultLabel,\n      resultEmoji: this.state.resultEmoji,\n      btnLabel: this.state.btnLabel,\n      btnBg: this.state.btnBg,\n      btnColor: this.state.btnColor,\n      btnShadow: this.state.btnShadow,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
